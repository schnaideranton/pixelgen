<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>pixel gen · tools sa</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#0a0a0a;color:#e8e8e8;
  font-family:'JetBrains Mono','IBM Plex Mono',Menlo,monospace;font-size:11px;
  -webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}
/* One seamless dark surface — panel shares the app's background, no border,
   no separate scrollbar. Panel fills its column; when viewport is short or
   tall, its inner groups flow into 1–3 columns via auto-fit so everything
   fits in the frame without a panel-local scrollbar. */
.app{display:grid;grid-template-columns:clamp(280px,22vw,340px) 1fr;grid-template-areas:"panel stage";height:100vh;background:#0a0a0a}
.panel{
  grid-area:panel;
  background:transparent;
  padding:12px 14px;
  display:grid;
  grid-template-columns:1fr;
  grid-auto-rows:min-content;
  gap:10px 14px;
  align-content:start;
  overflow:hidden;
  min-height:0;
}
/* 2-column panel kicks in earlier so typical laptop viewports don't clip the
   tail of the panel. 3-column on very short viewports. */
@media (max-height: 980px) and (min-width: 880px){
  .app{grid-template-columns:minmax(420px,30vw) 1fr}
  .panel{grid-template-columns:1fr 1fr;gap:10px 14px}
  .panel .full{grid-column:1 / -1}
}
@media (max-height: 680px) and (min-width: 1200px){
  .app{grid-template-columns:minmax(540px,36vw) 1fr}
  .panel{grid-template-columns:1fr 1fr 1fr;gap:8px 12px}
  .panel .full{grid-column:1 / -1}
}
.stage{grid-area:stage;display:flex;flex-direction:column;overflow:hidden;background:transparent;min-width:0;min-height:0}
.panel h1{font-size:10px;margin:0 0 2px;letter-spacing:.2em;text-transform:uppercase;color:#999}
.panel .sub{font-size:9px;color:#555;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
.group{margin:0}
.group-label{font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:#666;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #1a1a1a}
.row{display:flex;align-items:center;gap:8px;margin-bottom:4px;min-height:22px}
.row>label{flex:1;color:#bbb;font-size:11px}
.row input[type=number]{background:#151515;color:#fff;border:1px solid #252525;padding:3px 6px;font-family:inherit;font-size:11px;width:72px;text-align:right}
.row input[type=number]:focus{outline:0;border-color:#555}
.row input[type=range]{flex:1.6;accent-color:#e8e8e8}
.row .val{color:#e8e8e8;width:30px;text-align:right;font-variant-numeric:tabular-nums;font-size:10px}
.seg{display:flex;gap:0;border:1px solid #252525;background:#0a0a0a}
.seg.vert{flex-direction:column}
.seg.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0}
.seg button{flex:1;background:transparent;border:0;color:#888;padding:5px 4px;font-family:inherit;font-size:10px;cursor:pointer;text-transform:lowercase;letter-spacing:.03em}
.seg button:hover{color:#fff;background:#1a1a1a}
.seg button.on{background:#e8e8e8;color:#000}
.seg.vert button{text-align:left;padding:5px 8px;border-top:1px solid #181818}
.seg.vert button:first-child{border-top:0}
.seg.grid2 button{text-align:left;padding:5px 8px;border-top:1px solid #181818;border-left:1px solid #181818;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seg.grid2 button:nth-child(-n+2){border-top:0}
.seg.grid2 button:nth-child(2n+1){border-left:0}
.save-group{margin-top:4px;padding-top:10px;border-top:1px solid #1a1a1a}
.save-group button{width:100%;background:transparent;border:1px solid #2a2a2a;color:#e8e8e8;padding:8px;font-family:inherit;font-size:10px;cursor:pointer;margin-bottom:6px;text-transform:uppercase;letter-spacing:.15em}
.save-group button:hover{background:#1a1a1a}
/* .full class lets title/save-group span both columns in 2-col layout */
.panel .panel-head{margin:0 0 2px}
.panel .panel-head + .sub{margin-bottom:6px}

.top{padding:14px 20px;border-bottom:1px solid #1a1a1a;color:#666;display:flex;gap:22px;font-size:10px;text-transform:uppercase;letter-spacing:.12em;align-items:center;flex-wrap:wrap}
.top .k{color:#555}
.top .v{color:#e8e8e8;margin-left:6px}
.top .right{margin-left:auto;display:flex;gap:22px;align-items:center}
.canvas-wrap{flex:1;overflow:auto;padding:32px;display:flex;align-items:center;justify-content:center;min-height:0}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;background:transparent}
.canvas-holder{position:relative;display:inline-block;line-height:0;background:var(--canvas-bg,#000);box-shadow:0 0 0 1px #1a1a1a;transition:transform .3s ease-out, box-shadow .3s ease-out}
.canvas-holder::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;z-index:3}
.primary-bar{display:flex;flex-direction:column;gap:8px;padding:12px 16px;border-top:1px solid #1a1a1a;background:#0a0a0a;flex-shrink:0}
.primary-bar > .action-row{display:grid;grid-template-columns:1fr 1fr 56px;gap:8px}
.primary-bar button{background:#e8e8e8;color:#000;border:1px solid #e8e8e8;padding:11px;font-family:inherit;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:.18em;font-weight:600}
.primary-bar button.alt{background:transparent;color:#e8e8e8;border-color:#2a2a2a}
.primary-bar button:hover{background:#fff;color:#000}
.primary-bar button.alt:hover{background:#1a1a1a;color:#fff;border-color:#444}
.primary-bar button.fs-compact{padding:11px 8px;font-size:14px;letter-spacing:0;font-weight:400}

/* autoplay row: 8 equal columns. ▶ + 7 speed buttons. Black at rest, white
   when active. The play button gets its active state from body.autoplaying;
   the speed buttons toggle inside the seg. */
.autoplay-row{display:grid;grid-template-columns:repeat(8, 1fr);gap:0;border:1px solid #2a2a2a;background:#0a0a0a}
.autoplay-row button{background:transparent;color:#888;border:0;border-left:1px solid #181818;padding:9px 4px;font-family:inherit;font-size:10px;cursor:pointer;text-transform:lowercase;letter-spacing:.06em;font-weight:400;text-align:center}
.autoplay-row button:first-child{border-left:0;font-size:13px;letter-spacing:0}
.autoplay-row button:hover{color:#fff;background:#1a1a1a}
.autoplay-row button.on{background:#e8e8e8;color:#000}
body.autoplaying .autoplay-row #autoplay{background:#e8e8e8;color:#000}

/* audio block: visually a single container holding the two trigger buttons
   (beat-sync + BPM-lock) + BPM display, plus the compact 3-band EQ tucked
   underneath. Border + padding bind everything together. */
.audio-block{border:1px solid #2a2a2a;padding:8px;display:flex;flex-direction:column;gap:8px;background:#0c0c0c}
.audio-row{display:grid;grid-template-columns:1fr 1fr 78px;gap:6px;align-items:stretch}
.audio-row button{padding:9px 6px;font-size:10px;letter-spacing:.12em}
.status{padding:8px 16px;border-top:1px solid #1a1a1a;color:#666;font-size:10px;letter-spacing:.06em;flex-shrink:0;min-height:26px}
.status.ok{color:#06ffa5}
.status.err{color:#ff006e}
.hint{color:#444;font-size:10px;margin-top:4px;line-height:1.5}
kbd{background:#1a1a1a;border:1px solid #2a2a2a;padding:1px 5px;font-size:9px;border-radius:2px;color:#aaa;font-family:inherit}
.enum-restart{display:block;width:100%;margin-top:6px;background:transparent;border:1px solid #2a2a2a;color:#e8e8e8;padding:7px;font-family:inherit;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.12em}
.enum-restart:hover{background:#1a1a1a}
.seg.grid2 button.full-span{grid-column:1 / -1;border-left:0;text-align:center}
.drop-zone{border:1px dashed #333;padding:7px 10px;color:#777;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;gap:8px;min-height:30px;margin-top:6px;transition:border-color .15s, color .15s}
.drop-zone:hover,.drop-zone.over{border-color:#06ffa5;color:#06ffa5}
.drop-zone .drop-thumb{width:32px;height:32px;object-fit:cover;border:1px solid #252525;flex:none;display:block}
.drop-zone .drop-info{flex:1;text-align:left;font-size:9px;color:#888;letter-spacing:.04em}
.drop-zone .drop-clear{background:transparent;border:1px solid #2a2a2a;color:#888;padding:3px 8px;font-family:inherit;font-size:10px;cursor:pointer;flex:none}
.drop-zone .drop-clear:hover{color:#fff;background:#1a1a1a}
.color-picker-row{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.color-picker-row input[type=color]{-webkit-appearance:none;appearance:none;width:26px;height:26px;border:1px solid #333;padding:0;background:transparent;cursor:pointer;flex:0 0 auto}
.color-picker-row input[type=color]::-webkit-color-swatch-wrapper{padding:0}
.color-picker-row input[type=color]::-webkit-color-swatch{border:0}
.color-picker-row input[type=color]::-moz-color-swatch{border:0}
.color-picker-row input[type=color]:hover{border-color:#06ffa5}
canvas{cursor:pointer}
.save-flash{position:absolute;border:2px solid #06ffa5;box-shadow:0 0 16px rgba(6,255,165,.7), inset 0 0 12px rgba(6,255,165,.5);box-sizing:border-box;pointer-events:none;z-index:5;animation:saveflash .55s ease-out forwards}
@keyframes saveflash{0%{opacity:0;transform:scale(1)}30%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(1.02)}}

/* ==== autoplay + fullscreen ==== */
/* fs-overlay autoplay button keeps its prominent green so it reads on top of
   the canvas; in-bar #autoplay uses the unified white-active treatment from
   the .autoplay-row block above. */
body.autoplaying #fsAutoplay{background:#06ffa5;color:#000;border-color:#06ffa5}
body.beatsyncing #beatsync{background:#e8e8e8;color:#000;border-color:#e8e8e8}
body.bpmlocking #bpmsync{background:#e8e8e8;color:#000;border-color:#e8e8e8}
/* compact 3-band EQ tucked under the beat-sync/BPM-lock buttons. 3 mini rows,
   one per band. Each row: tiny label · sensitivity slider · onset-pulse meter. */
.beat-eq{display:grid;grid-template-columns:18px 1fr 36px;gap:3px 6px;align-items:center}
.beat-eq .band-label{color:#777;font-size:9px;text-transform:uppercase;letter-spacing:.12em;text-align:right}
.beat-eq input[type=range]{width:100%;accent-color:#ff14c6;height:14px}
/* onset-pulse meters: the bar is dark at rest and flashes ONLY when an
   onset is detected for its band — the user tunes sensitivity until the
   flash aligns with the audible beat, not with room noise. */
.beat-meter{height:8px;background:#1a1a1a;border:1px solid #252525;position:relative;overflow:hidden;border-radius:2px}
.beat-meter>span{position:absolute;inset:0;background:currentColor;opacity:0;transform-origin:left;box-shadow:0 0 8px currentColor;will-change:opacity,transform}
.beat-meter.pulse>span{animation:beatPulse .22s ease-out}
@keyframes beatPulse{
  0%  {opacity:0;transform:scaleX(0.02)}
  12% {opacity:1;transform:scaleX(1)}
  100%{opacity:0;transform:scaleX(1)}
}
/* per-band colour cues: low=pink, mid=amber, high=cyan */
.beat-eq .band-label.lo,.beat-eq .beat-meter.lo{color:#ff14c6}
.beat-eq .band-label.mi,.beat-eq .beat-meter.mi{color:#ffbe0b}
.beat-eq .band-label.hi,.beat-eq .beat-meter.hi{color:#06ffa5}
.bpm-display{text-align:center;background:#0a0a0a;border:1px solid #1f1f1f;color:#06ffa5;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:18px;font-weight:600;padding:6px 6px;letter-spacing:0.02em;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:color .15s;line-height:1}
.bpm-display.locked{color:#ffbe0b;background:#140f00}
.bpm-display .bpm-unit{font-size:8px;color:#555;margin-top:2px;font-weight:400;letter-spacing:.15em}
body.bpm-pulse .bpm-display{animation:bpmPulse .12s ease-out}
@keyframes bpmPulse{0%{transform:scale(1.08);color:#fff}100%{transform:scale(1);color:#06ffa5}}
.fs-overlay{position:fixed;bottom:24px;right:20px;display:none;gap:8px;z-index:100}
.fs-overlay button{background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.22);color:#fff;width:52px;height:52px;font-size:18px;cursor:pointer;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-radius:6px;font-family:inherit;touch-action:manipulation}
@media(max-width:820px){.fs-overlay{bottom:calc(28px + env(safe-area-inset-bottom));right:16px}.fs-overlay button{width:60px;height:60px;font-size:22px}}
.fs-overlay button:hover{background:rgba(0,0,0,0.85)}
body.fs .fs-overlay{display:flex}
body.fs .panel,body.fs .top,body.fs .primary-bar,body.fs .status{display:none!important}
body.fs .app{display:block!important;height:100vh!important;width:100vw!important}
body.fs .stage{width:100vw!important;height:100vh!important;display:block!important}
body.fs .canvas-wrap{padding:0!important;max-height:100vh!important;min-height:100vh!important;height:100vh!important;width:100vw!important}
body.fs{overflow:hidden!important;position:fixed;width:100%;height:100%}

.canvas-wrap{position:relative}

/* ==== mobile-first responsive: canvas locked to a top square, everything
   else scrolls below ==== */
@media (max-width:820px){
  html,body{height:auto;overflow:visible}
  body{-webkit-overflow-scrolling:touch;overflow-x:hidden}
  .app{
    display:flex;flex-direction:column;height:auto;min-height:100vh;
  }
  .stage{order:1;flex:0 0 auto}
  .panel{order:2;border-right:0;border-top:1px solid #1f1f1f;padding:16px 14px calc(48px + env(safe-area-inset-bottom))}
  /* locked square work area — no jumping when generate changes canvas ratio.
     safe-area-inset-top accounts for iPhone notch so the top bar sits below it. */
  .canvas-wrap{
    width:100vw;height:100vw;
    max-height:none;min-height:0;
    padding:8px;flex:none;
    box-sizing:border-box;
  }
  .top{padding:calc(10px + env(safe-area-inset-top)) 14px 10px;font-size:9px;gap:12px}
  .top .right{display:none}
  .primary-bar{
    padding:10px 12px;gap:6px;
  }
  .primary-bar button{padding:12px 8px;font-size:10px;letter-spacing:.12em}
  .group-label{font-size:10px}
  .row>label{font-size:12px}
  .row input[type=number]{font-size:13px;padding:6px 8px;width:80px}
  .seg button{padding:8px 4px;font-size:11px}
  .save-group button{padding:11px;font-size:11px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="panel">
    <div class="full panel-head-wrap">
      <h1 class="panel-head">pixel gen</h1>
      <div class="sub">tools sa · v2</div>
    </div>

    <div class="group">
      <div class="group-label">canvas</div>
      <div class="row"><label>bg</label>
        <div class="seg" id="bg" data-val="black" style="flex:1.6">
          <button data-v="black" class="on">black</button>
          <button data-v="white">white</button>
        </div>
      </div>
      <div class="row"><label>layout</label>
        <div class="seg" id="layout" data-val="grid" style="flex:1.6">
          <button data-v="grid" class="on">grid</button>
          <button data-v="single">single · big</button>
        </div>
      </div>
      <!-- hidden: width/height/margin are auto-computed each generate().
           cw/ch follow viewport, margin = spacing. fit-to-screen is always on
           — no toggle, no UI clutter. -->
      <input type="hidden" id="cw" value="1600">
      <input type="hidden" id="ch" value="1600">
      <input type="hidden" id="margin" value="0">
      <input type="hidden" id="fit" value="1">
    </div>

    <div class="group">
      <div class="group-label">pattern</div>
      <div class="row"><label>cells</label><input type="range" id="psize_r" min="3" max="20" value="5" step="1"><input type="text" id="psize" value="5×5" inputmode="numeric" autocomplete="off" style="width:52px;background:#151515;color:#fff;border:1px solid #252525;padding:3px 6px;font-family:inherit;font-size:11px;text-align:right"></div>
      <div class="row"><label>pixel scale</label><input type="range" id="pscale_r" min="2" max="60" value="10" step="1"><input type="number" id="pscale" value="10" min="2" max="60" style="width:52px"></div>
      <div class="row"><label>spacing</label><input type="range" id="spacing_r" min="0" max="100" value="6" step="1"><input type="number" id="spacing" value="6" min="0" max="100" style="width:52px"></div>
      <!-- fill % lives with the geometry parameters because cells/scale/spacing
           and fill all describe the same thing — how dense the canvas reads.
           Removed the separate "density" label since it was a one-row group. -->
      <div class="row"><label>fill</label><input type="range" id="fill" min="10" max="85" value="42"><span class="val" id="fillv">42</span></div>
    </div>

    <div class="group">
      <div class="group-label">mode</div>
      <div class="seg grid2" id="mode" data-val="hybrid">
        <button data-v="random">random</button>
        <button data-v="hybrid" class="on">hybrid · all</button>
        <button data-v="h-sym">h-sym</button>
        <button data-v="v-sym">v-sym</button>
        <button data-v="quad">quad</button>
        <button data-v="radial">radial</button>
        <button data-v="emblem">emblem</button>
        <button data-v="glyph">glyph</button>
        <button data-v="carpet">carpet · rug</button>
      </div>
    </div>

    <div class="group">
      <div class="group-label">color</div>
      <div class="seg grid2" id="palette" data-val="neon">
        <button data-v="mono">mono</button>
        <button data-v="grays">grays · px</button>
        <button data-v="random">random rgb</button>
        <button data-v="chaos">chaos · px</button>
        <button data-v="neon" class="on">neon</button>
        <button data-v="retro">retro</button>
        <button data-v="pastel">pastel</button>
        <button data-v="acid">acid</button>
        <button data-v="crt">crt green</button>
        <button data-v="warm">warm earth</button>
        <button data-v="image" class="full-span">image · from drop ↓</button>
        <button data-v="custom" class="full-span">custom · pick below ↓</button>
      </div>
      <div id="imgdrop" class="drop-zone">
        <span>drop image · or click to pick</span>
        <input type="file" accept="image/*" hidden>
      </div>
      <div id="customColors" class="color-picker-row">
        <input type="color" value="#ff006e" data-idx="0">
        <input type="color" value="#fb5607" data-idx="1">
        <input type="color" value="#ffbe0b" data-idx="2">
        <input type="color" value="#8338ec" data-idx="3">
        <input type="color" value="#3a86ff" data-idx="4">
        <input type="color" value="#06ffa5" data-idx="5">
        <input type="color" value="#ff14c6" data-idx="6">
        <input type="color" value="#ffffff" data-idx="7">
      </div>
      <div class="row" style="margin-top:8px"><label>colors / symbol</label>
        <div class="seg" id="mcol" data-val="2" style="flex:1.6">
          <button data-v="1">1</button>
          <button data-v="2" class="on">2</button>
          <button data-v="3">3</button>
          <button data-v="4">4</button>
          <button data-v="5">5</button>
          <button data-v="6">6</button>
          <button data-v="7">7</button>
          <button data-v="8">8</button>
        </div>
      </div>
    </div>

    <div class="group">
      <div class="group-label">surface</div>
      <div class="row"><label>outer round</label>
        <div class="seg" id="outer" data-val="0" style="flex:1.2">
          <button data-v="0" class="on">off</button>
          <button data-v="1">on</button>
        </div>
      </div>
      <div class="row"><label>inner round</label>
        <div class="seg" id="inner" data-val="0" style="flex:1.2">
          <button data-v="0" class="on">off</button>
          <button data-v="1">on</button>
        </div>
      </div>
      <div class="row"><label>blend</label>
        <div class="seg" id="gradblend" data-val="0" style="flex:1.2">
          <button data-v="0" class="on">off</button>
          <button data-v="1">on</button>
        </div>
      </div>
    </div>

    <div class="group">
      <div class="group-label">behavior</div>
      <!-- no-duplicates is always on (we never want repeats inside one canvas).
           Hidden anchor preserves the existing dedup read in generate(). -->
      <input type="hidden" id="dedup" data-val="1" value="1">
      <div class="row"><label>cycle</label>
        <div class="seg" id="enum" data-val="0" style="flex:1.2">
          <button data-v="0" class="on">off</button>
          <button data-v="1">on</button>
        </div>
      </div>
      <div class="row"><label>jump to</label>
        <input type="range" id="enumslider" min="0" max="10000" value="0" style="flex:1.6;accent-color:#06ffa5">
        <span class="val" id="enumpos" style="width:58px">0%</span>
      </div>
      <!-- seed is auto-randomized each generate(); current value is shown in
           the top bar so a memorable canvas can be screenshot-captured. -->
      <input type="hidden" id="seed" value="0">
      <button id="enumrestart" class="enum-restart">↻ restart cycle</button>
    </div>

    <div class="group">
      <div class="group-label">playback</div>
      <div class="row"><label>source</label>
        <div class="seg" id="autosrc" data-val="fixed" style="flex:1.6">
          <button data-v="fixed" class="on">fixed</button>
          <button data-v="morph">morph</button>
          <button data-v="wild">wild</button>
        </div>
      </div>
    </div>

    <div class="save-group full">
      <div class="row" style="margin-bottom:6px"><label>format</label>
        <div class="seg" id="savefmt" data-val="png" style="flex:1.2">
          <button data-v="png" class="on">PNG</button>
          <button data-v="svg">SVG</button>
        </div>
      </div>
      <button id="save">save png → folder</button>
      <button id="savejson">save patterns json</button>

<script>
// ========== rng ==========
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
let rand = mulberry32(1);
const R = () => rand();
const RI = n => Math.floor(rand()*n);
const pick = a => a[RI(a.length)];

// ========== palettes ==========
const PALETTES = {
  neon:   ['#ff006e','#fb5607','#ffbe0b','#8338ec','#3a86ff','#06ffa5','#ff14c6'],
  retro:  ['#e63946','#f1c40f','#a8dadc','#457b9d','#e76f51','#2a9d8f','#ffb703'],
  pastel: ['#ffadad','#ffd6a5','#fdffb6','#caffbf','#9bf6ff','#a0c4ff','#bdb2ff','#ffc6ff'],
  acid:   ['#39ff14','#ff10f0','#fffb00','#00ffff','#ff3131','#c8ff00','#aaff00'],
  crt:    ['#00ff41','#70ff80','#008f11','#b6ffb6','#c5fcbe'],
  warm:   ['#d4a373','#e9c46a','#f4a261','#e76f51','#bc6c25','#dda15e','#606c38'],
};
function randHSL(){const h=RI(360),s=60+RI(35),l=52+RI(35);return`hsl(${h} ${s}% ${l}%)`}
let customPalette = ['#ff006e','#fb5607','#ffbe0b','#8338ec','#3a86ff','#06ffa5','#ff14c6','#ffffff'];
function getPalette(mode,bg){
  if(mode==='mono') return [bg==='black'?'#ffffff':'#000000'];
  if(mode==='random'||mode==='chaos'||mode==='grays'||mode==='image') return null;
  if(mode==='custom') return customPalette.slice();
  return PALETTES[mode];
}
let imagePalette = null;

// ========== pattern generators ==========
const empty = n => Array.from({length:n},()=>Array(n).fill(0));

function genRandom(n,p){
  const m=empty(n);
  for(let y=0;y<n;y++)for(let x=0;x<n;x++)m[y][x]=R()<p?1:0;
  return m;
}
function genHSym(n,p){
  const m=empty(n),half=Math.ceil(n/2);
  for(let y=0;y<n;y++)for(let x=0;x<half;x++){const v=R()<p?1:0;m[y][x]=v;m[y][n-1-x]=v}
  return m;
}
function genVSym(n,p){
  const m=empty(n),half=Math.ceil(n/2);
  for(let y=0;y<half;y++)for(let x=0;x<n;x++){const v=R()<p?1:0;m[y][x]=v;m[n-1-y][x]=v}
  return m;
}
function genQuad(n,p){
  const m=empty(n),h=Math.ceil(n/2);
  for(let y=0;y<h;y++)for(let x=0;x<h;x++){
    const v=R()<p?1:0;
    m[y][x]=v;m[y][n-1-x]=v;m[n-1-y][x]=v;m[n-1-y][n-1-x]=v;
  }
  return m;
}
// radial rosette — full dihedral D4: 4-fold rotation combined with diagonal mirror.
// the aesthetic target is snowflake / flower / compass rose, which require the
// mirror axis to read correctly — without it the shape becomes a pinwheel, which
// is not what "rosette" visually means.
function genRadial(n,p){
  const m=empty(n),h=Math.ceil(n/2);
  // iterate only the octant x >= y — D4's fundamental domain —
  // so each orbit is rolled once regardless of whether n is even or odd.
  for(let y=0;y<h;y++)for(let x=y;x<h;x++){
    if(R()>=p) continue;
    m[y][x]=1;
    m[x][n-1-y]=1;
    m[n-1-y][n-1-x]=1;
    m[n-1-x][y]=1;
    m[x][y]=1;
    m[y][n-1-x]=1;
    m[n-1-x][n-1-y]=1;
    m[n-1-y][x]=1;
  }
  return m;
}
function genEmblem(n,p){
  const m=empty(n),c=Math.floor(n/2),h=Math.ceil(n/2);
  const maxD=Math.sqrt(2)*c;
  for(let y=0;y<h;y++)for(let x=0;x<h;x++){
    const dx=c-x,dy=c-y,d=Math.sqrt(dx*dx+dy*dy);
    const w=1-d/(maxD+.001);
    const prob=p*(0.35+1.1*w);
    const v=R()<prob?1:0;
    m[y][x]=v;m[y][n-1-x]=v;m[n-1-y][x]=v;m[n-1-y][n-1-x]=v;
  }
  if(n%2===1) m[c][c]=1;
  return m;
}
function genGlyph(n,p){
  const m=empty(n),c=Math.floor(n/2);
  const ops=['vline','hline','diag','antidiag','dot','cross','corner','frame','halfframe','lshape','plus','ring'];
  const count=1+RI(3);
  const useSym=R()<0.7;
  const sym=pick(['h','v','quad','none']);
  const put=(x,y)=>{
    if(x<0||x>=n||y<0||y>=n)return;
    m[y][x]=1;
    if(useSym){
      if(sym==='h'||sym==='quad') m[y][n-1-x]=1;
      if(sym==='v'||sym==='quad') m[n-1-y][x]=1;
      if(sym==='quad') m[n-1-y][n-1-x]=1;
    }
  };
  for(let k=0;k<count;k++){
    const op=pick(ops);
    if(op==='vline'){const x=RI(n);for(let y=0;y<n;y++)put(x,y)}
    else if(op==='hline'){const y=RI(n);for(let x=0;x<n;x++)put(x,y)}
    else if(op==='diag'){for(let i=0;i<n;i++)put(i,i)}
    else if(op==='antidiag'){for(let i=0;i<n;i++)put(i,n-1-i)}
    else if(op==='dot'){put(RI(n),RI(n));put(RI(n),RI(n))}
    else if(op==='cross'){for(let i=0;i<n;i++){put(c,i);put(i,c)}}
    else if(op==='plus'){put(c,c);put(c-1,c);put(c+1,c);put(c,c-1);put(c,c+1)}
    else if(op==='corner'){put(0,0);put(1,0);put(0,1)}
    else if(op==='frame'){for(let i=0;i<n;i++){put(i,0);put(i,n-1);put(0,i);put(n-1,i)}}
    else if(op==='halfframe'){for(let i=0;i<n;i++){put(i,0);put(0,i)}}
    else if(op==='lshape'){for(let i=0;i<n;i++){put(0,i);put(i,n-1)}}
    else if(op==='ring'){for(let i=1;i<n-1;i++){put(i,1);put(i,n-2);put(1,i);put(n-2,i)}}
  }
  if(R()<0.25){
    for(let y=0;y<n;y++)for(let x=0;x<n;x++){if(m[y][x]&&R()<0.15)m[y][x]=0}
  }
  return m;
}

const MODES={
  random:genRandom,'h-sym':genHSym,'v-sym':genVSym,
  quad:genQuad,radial:genRadial,emblem:genEmblem,glyph:genGlyph,
};
// hybrid bag favors mirror-based modes because mirror symmetry reads as "language" —
// most world alphabets and emblems are mirror-symmetric, not rotational.
const HYBRID_BAG = ['h-sym','h-sym','v-sym','v-sym','quad','quad','quad','emblem','emblem','glyph','glyph','glyph','radial','random','random'];

function density(m){let c=0;const n=m.length;for(const r of m)for(const v of r)if(v)c++;return c/(n*n)}

function genPattern(mode,n,fillPct){
  const p=fillPct/100;
  // Fallback: if mode isn't a registered atomic generator (e.g. 'carpet',
  // which is a layout mode handled in generate()), substitute hybrid so
  // any path that calls genPattern directly still produces output.
  const fn = mode==='hybrid' ? MODES[pick(HYBRID_BAG)] : (MODES[mode] || MODES[pick(HYBRID_BAG)]);
  let best=null,bestScore=-Infinity;
  for(let i=0;i<8;i++){
    const m=fn(n,p);
    const d=density(m);
    if(d>=0.2&&d<=0.65) return m;
    const score = -(Math.max(0,0.2-d)+Math.max(0,d-0.65));
    if(score>bestScore){bestScore=score;best=m}
  }
  return best;
}
function patHash(m){let s='';for(const r of m)s+=r.join('');return s}

// ========== color ==========
function findClusters(m){
  const n=m.length,seen=Array.from({length:n},()=>Array(n).fill(false)),out=[];
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    if(m[y][x]&&!seen[y][x]){
      const stk=[[y,x]],cells=[];
      while(stk.length){
        const [yy,xx]=stk.pop();
        if(yy<0||yy>=n||xx<0||xx>=n)continue;
        if(seen[yy][xx]||!m[yy][xx])continue;
        seen[yy][xx]=true;cells.push([yy,xx]);
        stk.push([yy+1,xx],[yy-1,xx],[yy,xx+1],[yy,xx-1]);
      }
      out.push(cells);
    }
  }
  return out;
}

function colorize(m,palette,maxColors,bg,paletteMode){
  const n=m.length;
  const g=Array.from({length:n},()=>Array(n).fill(null));

  // chaos mode: every active cell gets its own hue, no clustering
  if(paletteMode==='chaos'){
    for(let y=0;y<n;y++)for(let x=0;x<n;x++){
      if(m[y][x]){
        const h=RI(360),s=65+RI(30),l=55+RI(35);
        g[y][x]=`hsl(${h} ${s}% ${l}%)`;
      }
    }
    return g;
  }
  // image mode: sample per-pixel from the dropped image's colour pool.
  // the pool is a flat array of ~4K raw pixel samples, so picking uniformly
  // naturally reproduces the image's colour proportions.
  if(paletteMode==='image' && imagePalette && imagePalette.length>0){
    for(let y=0;y<n;y++)for(let x=0;x<n;x++){
      if(m[y][x]) g[y][x] = imagePalette[RI(imagePalette.length)];
    }
    return g;
  }
  // grays mode: per-pixel random gray shade, kept contrasting against bg
  // Use hex directly to guarantee correct canvas rendering across all browsers
  if(paletteMode==='grays'){
    for(let y=0;y<n;y++)for(let x=0;x<n;x++){
      if(m[y][x]){
        // black bg: light grays 55–99%; white bg: dark grays 2–52%
        const l = bg==='black' ? (55 + RI(45)) : (2 + RI(51));
        const v = Math.round(l / 100 * 255);
        const hx = v.toString(16).padStart(2,'0');
        g[y][x] = `#${hx}${hx}${hx}`;
      }
    }
    return g;
  }

  // exact colour count per symbol (not "up to N"). Round-robin through clusters
  // so every requested colour appears at least once whenever clusters ≥ colours.
  const c = Math.max(1, maxColors);
  let colors;
  if(palette===null){
    colors=[]; for(let i=0;i<c;i++) colors.push(randHSL());
  } else {
    const sh=[...palette].sort(()=>R()-.5);
    colors=[]; for(let i=0;i<c;i++) colors.push(sh[i % sh.length]);
  }
  const clusters=findClusters(m);
  const shuf=[...colors].sort(()=>R()-.5);
  clusters.forEach((cells,i)=>{
    const col = shuf[i % shuf.length];
    for(const [y,x] of cells) g[y][x] = col;
  });
  return g;
}

// ========== enumeration ==========
// Sweep all binary patterns inside a mode's fundamental domain, ordered
// by popcount (sparse → dense), then lex within each popcount level.
function binomial(n,k){
  if(k<0||k>n) return 0;
  if(k===0||k===n) return 1;
  k=Math.min(k,n-k);
  let r=1;
  for(let i=0;i<k;i++) r = r*(n-i)/(i+1);
  return r;
}
function lexNthComb(m,k,rank){
  const r=[];
  let start=0,kr=k,idx=rank;
  while(kr>0){
    for(let i=start;i<m;i++){
      const c=binomial(m-1-i,kr-1);
      if(idx<c){r.push(i);start=i+1;kr--;break}
      idx-=c;
    }
  }
  return r;
}
function enumNthSubset(m,globalIdx){
  let cum=0;
  for(let k=0;k<=m;k++){
    const c=binomial(m,k);
    if(globalIdx<cum+c) return {k, subset:lexNthComb(m,k,globalIdx-cum)};
    cum+=c;
  }
  return {k:m+1, subset:[]};
}
function enumTotalForM(m){
  if(m>45) return Infinity;
  return Math.pow(2,m);
}
function fdomainMode(mode){
  switch(mode){
    case 'h-sym': return 'hsym';
    case 'v-sym': return 'vsym';
    case 'quad':  return 'quad';
    case 'emblem':return 'quad';
    case 'radial':return 'radial';
    default:      return 'none';
  }
}
function fdomainCells(fdMode,n){
  const cells=[],h=Math.ceil(n/2);
  if(fdMode==='hsym'){ for(let y=0;y<n;y++) for(let x=0;x<h;x++) cells.push([y,x]); }
  else if(fdMode==='vsym'){ for(let y=0;y<h;y++) for(let x=0;x<n;x++) cells.push([y,x]); }
  else if(fdMode==='quad'){ for(let y=0;y<h;y++) for(let x=0;x<h;x++) cells.push([y,x]); }
  else if(fdMode==='radial'){ for(let y=0;y<h;y++) for(let x=y;x<h;x++) cells.push([y,x]); }
  else { for(let y=0;y<n;y++) for(let x=0;x<n;x++) cells.push([y,x]); }
  return cells;
}
function expandFd(fdMode,n,subset,cells){
  const m=Array.from({length:n},()=>Array(n).fill(0));
  for(const idx of subset){
    const [y,x]=cells[idx];
    if(fdMode==='none'){ m[y][x]=1; }
    else if(fdMode==='hsym'){ m[y][x]=1; m[y][n-1-x]=1; }
    else if(fdMode==='vsym'){ m[y][x]=1; m[n-1-y][x]=1; }
    else if(fdMode==='quad'){ m[y][x]=1; m[y][n-1-x]=1; m[n-1-y][x]=1; m[n-1-y][n-1-x]=1; }
    else if(fdMode==='radial'){
      m[y][x]=1; m[x][n-1-y]=1; m[n-1-y][n-1-x]=1; m[n-1-x][y]=1;
      m[x][y]=1; m[y][n-1-x]=1; m[n-1-x][n-1-y]=1; m[n-1-y][x]=1;
    }
  }
  return m;
}
let enumCursor=0, enumKey='';
function enumKeyOf(mode,n){ return `${n}|${fdomainMode(mode)}`; }

// ========== state ==========
let state=null;
const getVal = id => document.getElementById(id).dataset.val;
// getNum tolerates text inputs like "5×5", "5 x 5", "  5  ": pull the first
// integer out and ignore whatever follows. Prevents NaN cascades when an
// input is in display-format mode.
const getNum = id => {
  const el = document.getElementById(id);
  if(!el) return 0;
  const v = el.value;
  const n = parseInt(String(v).match(/-?\d+/)?.[0] ?? '0', 10);
  return isNaN(n) ? 0 : n;
};
function setSeg(id, val){
  const seg=document.getElementById(id);
  seg.dataset.val=String(val);
  seg.querySelectorAll('button').forEach(b=>{
    b.classList.toggle('on', b.dataset.v===String(val));
  });
}
function setNum(id, val){
  // psize is a display-format text input ("N×N"); everything else is a plain
  // number input. Same setNum API for both so callers don't need to care.
  if(id === 'psize'){
    document.getElementById(id).value = val + '×' + val;
  } else {
    document.getElementById(id).value = val;
  }
  const r = document.getElementById(id+'_r');
  if(r) r.value = val;
}

function generate(){
  // Always fit-to-screen — width/height inputs are hidden and informational
  // only. Canvas tracks viewport every regenerate.
  let cw, ch;
  {
    const wrap=document.querySelector('.canvas-wrap');
    const wW = wrap.clientWidth || window.innerWidth;
    const wH = wrap.clientHeight || Math.max(400, window.innerHeight*0.6);
    cw = Math.max(240, Math.floor(wW - 16));
    ch = Math.max(240, Math.floor(wH - 16));
    setNum('cw', cw); setNum('ch', ch);
  }
  const bg=getVal('bg');
  const n=getNum('psize'),pscale=getNum('pscale'),spacing=getNum('spacing');
  // Margin auto-equals spacing — edge gap = inter-cell gap, so the framing
  // breath always matches the gridding rhythm. Fixed minimum 4 px so single
  // pattern doesn't kiss the canvas edge when spacing=0.
  const margin = Math.max(4, spacing);
  setNum('margin', margin);
  const mode=getVal('mode');
  const fill=getNum('fill');
  const paletteMode=getVal('palette');
  const maxColors=+getVal('mcol');
  const dedup=getVal('dedup')==='1';
  let seed=getNum('seed');
  if(seed===0) seed=Math.floor(Math.random()*1e9);
  rand=mulberry32(seed);

  const layout=getVal('layout');
  let cols, rows, effPscale, effSpacing, offsetX, offsetY;
  if(layout==='single'){
    // one pattern — scale up to fill the canvas, centered, respecting margin
    const avail=Math.max(n*2, Math.min(cw-2*margin, ch-2*margin));
    effPscale=Math.max(2, Math.floor(avail/n));
    effSpacing=0;
    cols=1; rows=1;
    const blockS=n*effPscale;
    offsetX=(cw-blockS)/2;
    offsetY=(ch-blockS)/2;
  } else {
    effPscale=pscale;
    effSpacing=spacing;
    // carpet mode forces gap = one pixel-cell wide. The gaps between blocks
    // then read as "the same fabric" as the patterns themselves — that's
    // what makes a Persian rug feel woven rather than gridded. We also
    // reflect this in the spacing slider so the UI doesn't lie.
    if(mode==='carpet'){
      effSpacing = effPscale;
      setNum('spacing', effSpacing);
    }
    const block=n*effPscale, stride=block+effSpacing;
    cols=Math.max(1,Math.floor((cw-2*margin+effSpacing)/stride));
    rows=Math.max(1,Math.floor((ch-2*margin+effSpacing)/stride));
    // centre the grid within the canvas — even leftover paddings on all sides
    const gridW=cols*stride-effSpacing;
    const gridH=rows*stride-effSpacing;
    offsetX=(cw-gridW)/2;
    offsetY=(ch-gridH)/2;
  }
  const total=cols*rows;

  const palette=getPalette(paletteMode,bg);
  const enumOn = getVal('enum')==='1';
  const patterns=[];
  let enumInfo=null;

  if(mode==='carpet' && layout==='grid'){
    // ── carpet · Persian-rug layout ────────────────────────────────────
    // Concentric Chebyshev-distance bands radiate from canvas centre. Each
    // band picks its own (sub-mode, palette subset, mcol). 4-way mirror:
    // cells with the same (mr, mc) mirror class share a single cached
    // pattern, flipped H/V/HV depending on which quadrant they sit in.
    // When height runs out before width, rings keep expanding sideways —
    // that's just a natural consequence of square-ring Chebyshev geometry.
    // Regenerate refreshes patterns inside the same carpet structure.
    const halfR = (rows-1)/2, halfC = (cols-1)/2;
    const maxRing = Math.max(halfR, halfC, 0.5);
    const SUB_MODES = ['emblem','radial','quad','glyph','h-sym','v-sym','random'];
    // 2–4 bands depending on grid size; tiny grids don't need many bands
    const BAND_COUNT = Math.max(2, Math.min(4, Math.ceil(maxRing/2)));
    const bandSpecs = [];
    for(let b=0; b<BAND_COUNT; b++){
      // each band gets a random palette slice — gives the "different colour
      // theme per ring" look that's archetypal for Persian carpets.
      let bandPalette = null;
      if(palette && palette.length){
        const len = palette.length;
        const off = Math.floor(R()*len);
        const size = Math.max(1, Math.min(len, 1+Math.floor(R()*4)));
        const arr = [];
        for(let i=0;i<size;i++) arr.push(palette[(off+i)%len]);
        bandPalette = arr;
      }
      const cap = Math.max(1, maxColors||1);
      bandSpecs.push({
        mode: SUB_MODES[Math.floor(R()*SUB_MODES.length)],
        mcol: Math.max(1, Math.min(cap, 1+Math.floor(R()*Math.min(4,cap)))),
        pal: bandPalette,
      });
    }
    // mirror-class cache: 4 quadrant-mates share one generated pattern
    const cache = Object.create(null);
    const flipMat = (mat, fh, fv) => {
      const sz = mat.length;
      const out = Array.from({length:sz},()=>Array(sz).fill(null));
      for(let y=0;y<sz;y++){
        for(let x=0;x<sz;x++){
          const sy = fv ? sz-1-y : y;
          const sx = fh ? sz-1-x : x;
          out[y][x] = mat[sy][sx];
        }
      }
      return out;
    };
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const mr = Math.min(r, rows-1-r);
        const mc = Math.min(c, cols-1-c);
        const dr = Math.abs(r - halfR);
        const dc = Math.abs(c - halfC);
        const ringD = Math.max(dr, dc);
        let bandIdx = Math.floor((ringD/maxRing) * BAND_COUNT);
        if(bandIdx >= BAND_COUNT) bandIdx = BAND_COUNT-1;
        const key = mr+','+mc+','+bandIdx;
        if(!cache[key]){
          const band = bandSpecs[bandIdx];
          const m0 = genPattern(band.mode, n, fill);
          const grid0 = colorize(m0, band.pal, band.mcol, bg, paletteMode);
          cache[key] = {m:m0, grid:grid0};
        }
        const cached = cache[key];
        const flipH = c > halfC;
        const flipV = r > halfR;
        const m = (flipH || flipV) ? flipMat(cached.m, flipH, flipV) : cached.m;
        const grid = (flipH || flipV) ? flipMat(cached.grid, flipH, flipV) : cached.grid;
        patterns.push({m, grid, band: bandIdx});
      }
    }
  } else if(enumOn){
    // enum sweep — systematic, deterministic
    const fdMode = fdomainMode(mode);
    const cells = fdomainCells(fdMode, n);
    const fdSize = cells.length;
    const fullTotal = enumTotalForM(fdSize);
    const key = enumKeyOf(mode, n);
    if(key !== enumKey){ enumCursor=0; enumKey=key; }
    const startCursor = enumCursor;
    let firstK=null, lastK=0;
    for(let i=0;i<total;i++){
      const raw = startCursor + i;
      const idx = isFinite(fullTotal) ? (raw % fullTotal) : raw;
      const {k, subset} = enumNthSubset(fdSize, idx);
      if(firstK===null) firstK=k;
      lastK=k;
      const matrix = expandFd(fdMode, n, subset, cells);
      // deterministic per-pattern rng so coloured palettes don't flicker between renders
      rand = mulberry32((idx + 1) * 2654435761 | 0);
      patterns.push({m:matrix, grid:colorize(matrix, palette, maxColors, bg, paletteMode), band:Math.floor(Math.random()*3)});
    }
    enumCursor = startCursor + total;
    if(isFinite(fullTotal) && enumCursor >= fullTotal) enumCursor = enumCursor % fullTotal;
    enumInfo = {fdMode, fdSize, fullTotal, startCursor, firstK, lastK};
    rand = mulberry32(seed); // restore for anything else
  } else {
    const hashes=new Set();
    const maxTries=total*25; let tries=0;
    while(patterns.length<total && tries<maxTries){
      tries++;
      const m=genPattern(mode,n,fill);
      const h=patHash(m);
      if(dedup && hashes.has(h)) continue;
      hashes.add(h);
      patterns.push({m,grid:colorize(m,palette,maxColors,bg,paletteMode), band:Math.floor(Math.random()*3)});
    }
    while(patterns.length<total){
      const m=genPattern(mode,n,fill);
      patterns.push({m,grid:colorize(m,palette,maxColors,bg,paletteMode), band:Math.floor(Math.random()*3)});
    }
  }

  const outerRound = getVal('outer')==='1';
  const innerRound = getVal('inner')==='1';
  const gradBlend  = getVal('gradblend')==='1';
  state={cw,ch,margin,bg,n,pscale:effPscale,spacing:effSpacing,layout,offsetX,offsetY,mode,fill,paletteMode,maxColors,cols,rows,patterns,seed,enumInfo,outerRound,innerRound,gradBlend};
  render();
  document.getElementById('sgrid').textContent=`${cols}×${rows}`;
  document.getElementById('spatt').textContent=patterns.length;
  document.getElementById('sseed').textContent=enumOn ? '—' : seed;
  if(enumOn && enumInfo){
    const t = isFinite(enumInfo.fullTotal) ? enumInfo.fullTotal.toLocaleString() : '∞';
    const kRange = enumInfo.firstK===enumInfo.lastK ? `k=${enumInfo.firstK}` : `k=${enumInfo.firstK}..${enumInfo.lastK}`;
    setStatus(`enum · ${enumInfo.startCursor.toLocaleString()}→${(enumInfo.startCursor+total-1).toLocaleString()} / ${t} · ${kRange} · ${enumInfo.fdMode}`);
    syncEnumSlider(enumInfo);
  } else {
    setStatus(`${patterns.length} symbols · ${mode} · ${paletteMode} · seed ${seed}`);
  }
}

function syncEnumSlider(info){
  const sl = document.getElementById('enumslider');
  const lbl = document.getElementById('enumpos');
  if(!sl || !lbl) return;
  if(isFinite(info.fullTotal) && info.fullTotal > 0){
    const frac = info.startCursor / info.fullTotal;
    // don't fight a drag-in-progress — only update if slider isn't the source
    if(!sl.matches(':active')) sl.value = Math.round(frac * 10000);
    lbl.textContent = `${(frac*100).toFixed(1)}%`;
  } else {
    lbl.textContent = `${info.startCursor.toLocaleString()}`;
  }
}

// "full random" button — the big-bang shuffle. Touches EVERY parameter
// including geometry (cells, pixel scale, spacing). Used for the kaleidoscope
// surprise on demand. Does NOT touch bg (user-owned).
function generateWild(){
  const ri = n => Math.floor(Math.random()*n);
  const p = a => a[ri(a.length)];

  // pattern size: integer 3–20, biased toward 5–9 so wild mode mostly stays readable
  const pSize = p([3,4,5,5,5,6,7,7,8,9,10,11,13,16,20]);
  setNum('psize', pSize);
  const pScale = 4 + ri(18);
  setNum('pscale', pScale);
  const block = pSize * pScale;
  // spacing floor = ⌈block/3⌉, ceiling ~60% of block — gaps always read clearly
  const minSp = Math.max(3, Math.ceil(block / 3));
  const maxSp = Math.max(minSp + 4, Math.ceil(block * 0.6));
  const sp = minSp + ri(maxSp - minSp + 1);
  setNum('spacing', sp);

  // mode: all 8 families equal-weight + extra hybrid weight
  setSeg('mode', p(['random','hybrid','hybrid','h-sym','v-sym','quad','radial','emblem','glyph']));

  const bw = Math.random() < 1/3;
  const palette = bw
    ? p(['mono','grays','grays'])
    : p(['random','chaos','neon','retro','pastel','acid','crt','warm']);
  setSeg('palette', palette);

  const fill = 22 + ri(55);
  setNum('fill', fill);
  document.getElementById('fillv').textContent = fill;
  setSeg('mcol', p([1,2,2,3,3,4,4,5,6,7,8]));
  setSeg('enum', '0');
  updateEnumUI();
  setNum('seed', 0);
  generate();
}

// ========== corner rounding ==========
// outer: active pixel's convex corner (both ortho neighbours empty) → round off
// inner: empty cell's concave corner (both ortho neighbours active) → fillet grows
if(typeof CanvasRenderingContext2D!=='undefined' && !CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,rad){
    const [tl,tr,br,bl] = Array.isArray(rad) ? rad : [rad,rad,rad,rad];
    this.moveTo(x+tl,y);
    this.lineTo(x+w-tr,y);
    if(tr) this.arcTo(x+w,y,x+w,y+tr,tr);
    this.lineTo(x+w,y+h-br);
    if(br) this.arcTo(x+w,y+h,x+w-br,y+h,br);
    this.lineTo(x+bl,y+h);
    if(bl) this.arcTo(x,y+h,x,y+h-bl,bl);
    this.lineTo(x,y+tl);
    if(tl) this.arcTo(x,y,x+tl,y,tl);
  };
}
// BLEED: each fillet sits in an empty cell, abutting two active neighbours
// along the two straight sides of its wedge. With the canvas displayed at
// non-integer CSS scale, those shared edges antialias on both sides and
// produce a 1-px black hairline (bg shows through the partial-coverage
// pixels). We overshoot the straight edges by _FB px into the neighbours,
// so the seam gets overpainted. The DIAGONAL corner (1×1 square behind the
// pinch vertex at the cell corner) is deliberately EXCLUDED — it sits in
// the kitty-corner cell which may be empty and therefore has no source
// pixels in the bilinear raster, so including it would leak black through
// the clip. All four paths wind CLOCKWISE on screen; mixed winding would
// make the nonzero fill rule cancel the bleed overlap with the active
// neighbour's roundRect and punch a hole in the clip (that was the
// previous regression — TR/BL were CCW, which subtracted from the union
// and let the canvas bg through even in the PNG).
const _FB = 1;
// Path-only helpers (no beginPath / no fill). They append the wedge shape —
// including the _FB bleed into the 2 orthogonal neighbours — to the
// caller's current path. Used both for solid fillet fills AND for
// extending the bilinear-blend clip so the gradient flows seamlessly
// from an active cell into its fillet without a colour step at the
// shared corner.
function _filletTLPath(ctx,px,py,r){
  // CW traversal: top-bleed → arc (UL quadrant) → left-bleed → pinch at
  // cell TL corner (px,py), excluding the diagonal 1×1 square.
  ctx.moveTo(px+r,   py-_FB);
  ctx.arc(px+r, py+r, r, -Math.PI/2, Math.PI, true);    // (px+r,py) → (px,py+r)
  ctx.lineTo(px-_FB, py+r);
  ctx.lineTo(px-_FB, py);
  ctx.lineTo(px,     py);
  ctx.lineTo(px,     py-_FB);
  ctx.closePath();
}
function _filletTRPath(ctx,px,py,z,r){
  // CW: pinch at cell TR corner → right-bleed → arc (UR quadrant, CCW
  // visually = angle decreasing 0→-π/2) → top-bleed → back.
  ctx.moveTo(px+z+_FB, py);
  ctx.lineTo(px+z+_FB, py+r);
  ctx.arc(px+z-r, py+r, r, 0, -Math.PI/2, true);         // (px+z,py+r) → (px+z-r,py)
  ctx.lineTo(px+z-r, py-_FB);
  ctx.lineTo(px+z,   py-_FB);
  ctx.lineTo(px+z,   py);
  ctx.closePath();
}
function _filletBLPath(ctx,px,py,z,r){
  // CW: left-bleed → arc (BL quadrant, CCW visually = π→π/2) →
  // bottom-bleed → pinch at cell BL corner.
  ctx.moveTo(px-_FB, py+z);
  ctx.lineTo(px-_FB, py+z-r);
  ctx.arc(px+r, py+z-r, r, Math.PI, Math.PI/2, true);    // (px,py+z-r) → (px+r,py+z)
  ctx.lineTo(px+r, py+z+_FB);
  ctx.lineTo(px,   py+z+_FB);
  ctx.lineTo(px,   py+z);
  ctx.closePath();
}
function _filletBRPath(ctx,px,py,z,r){
  // CW: bottom-bleed → arc (BR quadrant, CCW visually = π/2→0) →
  // right-bleed → pinch at cell BR corner.
  ctx.moveTo(px+z-r, py+z+_FB);
  ctx.arc(px+z-r, py+z-r, r, Math.PI/2, 0, true);        // (px+z-r,py+z) → (px+z,py+z-r)
  ctx.lineTo(px+z+_FB, py+z-r);
  ctx.lineTo(px+z+_FB, py+z);
  ctx.lineTo(px+z,     py+z);
  ctx.lineTo(px+z,     py+z+_FB);
  ctx.closePath();
}
function filletTL(ctx,px,py,r,col){
  ctx.fillStyle=toHexColor(col); ctx.beginPath(); _filletTLPath(ctx,px,py,r); ctx.fill();
}
function filletTR(ctx,px,py,z,r,col){
  ctx.fillStyle=toHexColor(col); ctx.beginPath(); _filletTRPath(ctx,px,py,z,r); ctx.fill();
}
function filletBL(ctx,px,py,z,r,col){
  ctx.fillStyle=toHexColor(col); ctx.beginPath(); _filletBLPath(ctx,px,py,z,r); ctx.fill();
}
function filletBR(ctx,px,py,z,r,col){
  ctx.fillStyle=toHexColor(col); ctx.beginPath(); _filletBRPath(ctx,px,py,z,r); ctx.fill();
}
// ========== color blend helpers ==========
function _cornerRadii(M,n,x,y,z){
  const r=z/2;
  const tE=y===0||!M[y-1][x], bE=y===n-1||!M[y+1][x];
  const lE=x===0||!M[y][x-1], rE=x===n-1||!M[y][x+1];
  const dTL=y>0&&x>0&&M[y-1][x-1], dTR=y>0&&x<n-1&&M[y-1][x+1];
  const dBL=y<n-1&&x>0&&M[y+1][x-1], dBR=y<n-1&&x<n-1&&M[y+1][x+1];
  return[(tE&&lE&&!dTL)?r:0,(tE&&rE&&!dTR)?r:0,(bE&&rE&&!dBR)?r:0,(bE&&lE&&!dBL)?r:0];
}
// Lattice of corner colours. Every (n+1)×(n+1) lattice point gets a colour =
// mean of the 4 surrounding active cells. Neighbouring cells SHARE each corner,
// so corner colours are identical on both sides → C0 continuity for bilinear
// blend AND for inner-fillet colouring.
function _computeLattice(M, G, n){
  const rgb = new Array(n);
  for(let y=0;y<n;y++){
    rgb[y] = new Array(n);
    for(let x=0;x<n;x++){
      if(M[y][x] && G[y][x]){
        const hex = toHexColor(G[y][x]);
        rgb[y][x] = [
          parseInt(hex.slice(1,3),16),
          parseInt(hex.slice(3,5),16),
          parseInt(hex.slice(5,7),16)
        ];
      } else rgb[y][x] = null;
    }
  }
  const corners = new Array(n+1);
  for(let cy=0; cy<=n; cy++){
    corners[cy] = new Array(n+1);
    for(let cx=0; cx<=n; cx++){
      let r=0,g=0,b=0,k=0;
      const nbrs=[[cx-1,cy-1],[cx,cy-1],[cx-1,cy],[cx,cy]];
      for(const [bx,by] of nbrs){
        if(bx>=0&&bx<n&&by>=0&&by<n&&rgb[by][bx]){
          r+=rgb[by][bx][0]; g+=rgb[by][bx][1]; b+=rgb[by][bx][2]; k++;
        }
      }
      corners[cy][cx] = k ? [r/k, g/k, b/k] : null;
    }
  }
  return { rgb, corners };
}
function _rgbToHex(v){
  const c = i => {
    const n = Math.max(0, Math.min(255, Math.round(v[i])));
    return ('0' + n.toString(16)).slice(-2);
  };
  return '#' + c(0) + c(1) + c(2);
}
// Per-cell clip rect used by morph animation: {px,py,w,h} or undefined = full.
function _cellRect(clips, y, x, px, py, z){
  const c = clips && clips[y] && clips[y][x];
  if(c) return c;
  return { px, py, w: z, h: z };
}
// Bilinear interpolation over the shared-corner lattice, blitted under a
// clip made from (active cells outer-rounded rects) ∪ (inner fillet wedges).
// Because the fillet wedges are carved out of the SAME continuous bilinear
// image — not filled separately — the colour along every shared edge
// matches exactly on both sides. No corner seam.
// Empty cells that host any fillet are ALSO bilinear-filled so the wedge
// region has valid pixels to show. Active cells fall back to self-colour
// when some corners are null (e.g. isolated pixels on the grid edge).
function _drawBilinearBlend(ctx, M, G, n, z, x0, y0, outer, inner, lattice, clips){
  lattice = lattice || _computeLattice(M, G, n);
  const r = z/2;
  const { rgb, corners } = lattice;
  const W = n*z, H = n*z;
  const img = ctx.createImageData(W, H);
  const data = img.data;
  const denom = z>1 ? (z-1) : 1;
  // Does empty cell (y,x) host any fillet? (Any L-shape corner of active cells.)
  const hostsFillet = (y, x) => {
    if(M[y][x]) return false;
    if(y>0   && x>0   && M[y-1][x] && M[y][x-1]) return true;
    if(y>0   && x<n-1 && M[y-1][x] && M[y][x+1]) return true;
    if(y<n-1 && x>0   && M[y+1][x] && M[y][x-1]) return true;
    if(y<n-1 && x<n-1 && M[y+1][x] && M[y][x+1]) return true;
    return false;
  };
  for(let y=0;y<n;y++){
    for(let x=0;x<n;x++){
      const self = rgb[y][x];
      // Fill if cell is active, OR (inner is on AND cell hosts a fillet).
      const needFill = self || (inner && hostsFillet(y,x));
      if(!needFill) continue;
      const C00 = corners[y][x], C10 = corners[y][x+1];
      const C01 = corners[y+1][x], C11 = corners[y+1][x+1];
      const fb = self || C00 || C10 || C01 || C11;
      if(!fb) continue;
      const TL = C00 || fb, TR = C10 || fb, BL = C01 || fb, BR = C11 || fb;
      for(let ly=0; ly<z; ly++){
        const fy = z>1 ? ly/denom : 0, iy = 1-fy;
        for(let lx=0; lx<z; lx++){
          const fx = z>1 ? lx/denom : 0, ix = 1-fx;
          const w00 = ix*iy, w10 = fx*iy, w01 = ix*fy, w11 = fx*fy;
          const rr = TL[0]*w00 + TR[0]*w10 + BL[0]*w01 + BR[0]*w11;
          const gg = TL[1]*w00 + TR[1]*w10 + BL[1]*w01 + BR[1]*w11;
          const bb = TL[2]*w00 + TR[2]*w10 + BL[2]*w01 + BR[2]*w11;
          const idx = ((y*z+ly)*W + (x*z+lx))*4;
          data[idx]=rr; data[idx+1]=gg; data[idx+2]=bb; data[idx+3]=255;
        }
      }
    }
  }
  const off = document.createElement('canvas');
  off.width=W; off.height=H;
  off.getContext('2d').putImageData(img, 0, 0);
  ctx.save();
  ctx.beginPath();
  // active cells
  for(let y=0;y<n;y++) for(let x=0;x<n;x++){
    if(!M[y][x]) continue;
    const px = x0+x*z, py = y0+y*z;
    const rect = _cellRect(clips, y, x, px, py, z);
    // Final rounding is computed for the FULL-size cell; Canvas auto-clamps
    // the radii to half the current rect dimensions, so a thin growing strip
    // becomes a half-sphere, thickening into the full rounded rect at t=1.
    if(outer){
      const [tl,tr,br,bl] = _cornerRadii(M,n,x,y,z);
      ctx.roundRect(rect.px, rect.py, rect.w, rect.h, [tl,tr,br,bl]);
    } else {
      ctx.rect(rect.px, rect.py, rect.w, rect.h);
    }
  }
  // fillet wedges — carve them INTO the same clip so bilinear flows through
  if(inner){
    for(let y=0;y<n;y++) for(let x=0;x<n;x++){
      if(M[y][x]) continue;
      const px = x0 + x*z, py = y0 + y*z;
      if(y>0   && x>0   && M[y-1][x] && M[y][x-1]) _filletTLPath(ctx, px, py, r);
      if(y>0   && x<n-1 && M[y-1][x] && M[y][x+1]) _filletTRPath(ctx, px, py, z, r);
      if(y<n-1 && x>0   && M[y+1][x] && M[y][x-1]) _filletBLPath(ctx, px, py, z, r);
      if(y<n-1 && x<n-1 && M[y+1][x] && M[y][x+1]) _filletBRPath(ctx, px, py, z, r);
    }
  }
  ctx.clip();
  ctx.drawImage(off, x0, y0);
  ctx.restore();
}

function drawPatternToCtx(ctx, M, G, n, z, x0, y0, opts){
  const r = z/2;
  const outer = opts && opts.outer;
  const inner = opts && opts.inner;
  const gradient = opts && opts.gradient;
  const clips = opts && opts.clips;
  const presence = opts && opts.presence;
  // per-cell presence: 1 for stable cells, anim progress (0..1) for newborns,
  // 1-progress for dying. Shared fillets scale with the minimum presence of
  // their two adjacent cells so "inner corners grow with the cell body".
  const cellPresence = (y, x) => {
    if(!presence) return 1;
    const p = presence[y] && presence[y][x];
    return (p === undefined) ? 1 : p;
  };
  // lattice shared between bilinear blend AND inner-fillet colouring
  const lattice = gradient ? _computeLattice(M, G, n) : null;
  if(gradient){
    // fillets are carved into the bilinear clip — colour flows seamlessly
    // across the cell→fillet boundary, so no separate solid fillet pass.
    _drawBilinearBlend(ctx, M, G, n, z, x0, y0, outer, inner, lattice, clips);
  } else {
    // pass 1 — solid fills (with optional per-cell growRect clip)
    for(let y=0;y<n;y++) for(let x=0;x<n;x++){
      const col = G[y][x]; if(!col) continue;
      const px = x0 + x*z, py = y0 + y*z;
      const rect = _cellRect(clips, y, x, px, py, z);
      ctx.fillStyle = toHexColor(col);
      if(outer){
        const [tl,tr,br,bl]=_cornerRadii(M,n,x,y,z);
        ctx.beginPath();
        ctx.roundRect(rect.px, rect.py, rect.w, rect.h, [tl, tr, br, bl]);
        ctx.fill();
      } else {
        ctx.fillRect(rect.px, rect.py, rect.w, rect.h);
      }
    }
  }
  // In gradient mode, fillets are carved into the bilinear clip above —
  // colour flows continuously across the wedge boundary, no seam. Skip
  // the solid fillet pass here to avoid overpainting that gradient with
  // a flat corner colour.
  if(inner && !gradient){
    // inner fillet colour lookup: fallback to a neighbour's raw colour
    // (used only when gradient is off — in gradient mode the wedge is
    // part of the bilinear clip and this branch is skipped entirely).
    const cornerCol = (cy, cx, fa, fb) => fa || fb;
    const filRad = (ay, ax, by, bx) =>
      r * Math.min(cellPresence(ay, ax), cellPresence(by, bx));
    for(let y=0;y<n;y++) for(let x=0;x<n;x++){
      if(M[y][x]) continue;
      const px = x0 + x*z, py = y0 + y*z;
      let rr;
      if(y>0 && x>0 && M[y-1][x] && M[y][x-1]){
        rr = filRad(y-1, x, y, x-1);
        if(rr > 0.25) filletTL(ctx, px, py, rr,    cornerCol(y,   x,   G[y-1][x], G[y][x-1]));
      }
      if(y>0 && x<n-1 && M[y-1][x] && M[y][x+1]){
        rr = filRad(y-1, x, y, x+1);
        if(rr > 0.25) filletTR(ctx, px, py, z, rr, cornerCol(y,   x+1, G[y-1][x], G[y][x+1]));
      }
      if(y<n-1 && x>0 && M[y+1][x] && M[y][x-1]){
        rr = filRad(y+1, x, y, x-1);
        if(rr > 0.25) filletBL(ctx, px, py, z, rr, cornerCol(y+1, x,   G[y+1][x], G[y][x-1]));
      }
      if(y<n-1 && x<n-1 && M[y+1][x] && M[y][x+1]){
        rr = filRad(y+1, x, y, x+1);
        if(rr > 0.25) filletBR(ctx, px, py, z, rr, cornerCol(y+1, x+1, G[y+1][x], G[y][x+1]));
      }
    }
  }
}

// Morph animation: a newborn pixel grows out from the edge shared with its
// parent; a dying pixel shrinks back into the edge shared with a surviving
// neighbour. _growRect returns the visible sub-rect at progress s∈[0,1].
function _growRect(px, py, z, s, anchor){
  s = Math.max(0, Math.min(1, s));
  if(anchor==='top')    return { px,              py,              w: z,   h: z*s };
  if(anchor==='bottom') return { px,              py: py+z*(1-s), w: z,   h: z*s };
  if(anchor==='left')   return { px,              py,              w: z*s, h: z   };
  if(anchor==='right')  return { px: px+z*(1-s), py,              w: z*s, h: z   };
  return { px, py, w: z, h: z };
}
// Build display M/G/clips for one pattern at animation progress t∈[0,1].
// Dying cells are re-enabled (so bilinear lattice & solid pass still draw
// them) and clipped to a shrinking rect. Newborn cells are clipped to a
// growing rect.
function _buildAnimFrame(p, n, z, x0, y0, t){
  const M = p.m.map(r=>r.slice());
  const G = p.grid.map(r=>r.slice());
  const clips = {};
  const presence = {};
  const putClip = (y, x, rect) => {
    if(!clips[y]) clips[y] = {};
    clips[y][x] = rect;
  };
  const putPres = (y, x, v) => {
    if(!presence[y]) presence[y] = {};
    presence[y][x] = v;
  };
  if(p.anim && p.anim.spawn){
    for(const s of p.anim.spawn){
      const px = x0 + s.x*z, py = y0 + s.y*z;
      putClip(s.y, s.x, _growRect(px, py, z, t, s.anchor));
      putPres(s.y, s.x, t);
    }
  }
  if(p.anim && p.anim.die){
    for(const d of p.anim.die){
      M[d.y][d.x] = 1;
      G[d.y][d.x] = d.color;
      const px = x0 + d.x*z, py = y0 + d.y*z;
      putClip(d.y, d.x, _growRect(px, py, z, 1-t, d.anchor));
      putPres(d.y, d.x, 1-t);
    }
  }
  return { M, G, clips, presence };
}

function render(t){
  const s=state,cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  cv.width=s.cw;cv.height=s.ch;
  // canvas bitmap stays transparent; bg is painted by .canvas-holder via CSS var
  document.body.style.setProperty('--canvas-bg', s.bg==='black'?'#000':'#fff');
  ctx.clearRect(0,0,s.cw,s.ch);
  const stride=s.n*s.pscale+s.spacing;
  const baseOpts={outer:s.outerRound, inner:s.innerRound, gradient:s.gradBlend};
  const animActive = (typeof t === 'number' && t < 1);
  let i=0;
  for(let rr=0;rr<s.rows;rr++)for(let c=0;c<s.cols;c++){
    const p=s.patterns[i++];
    const x0=s.offsetX+c*stride, y0=s.offsetY+rr*stride;
    if(animActive && p.anim){
      const frame = _buildAnimFrame(p, s.n, s.pscale, x0, y0, t);
      drawPatternToCtx(ctx, frame.M, frame.G, s.n, s.pscale, x0, y0,
                       Object.assign({}, baseOpts, { clips: frame.clips, presence: frame.presence }));
    } else {
      drawPatternToCtx(ctx, p.m, p.grid, s.n, s.pscale, x0, y0, baseOpts);
    }
  }
  fitCanvas();
}

function fitCanvas(){
  if(!state) return;
  const cv=document.getElementById('cv');
  const wrap=document.querySelector('.canvas-wrap');
  // fallback to viewport size if wrap has no measured box yet (mobile webview race)
  const wAvail = Math.max(120, (wrap.clientWidth || window.innerWidth) - 24);
  const hAvail = Math.max(120, (wrap.clientHeight || window.innerHeight * 0.5) - 24);
  const scale = Math.min(1, wAvail/state.cw, hAvail/state.ch);
  cv.style.width = (state.cw*scale)+'px';
  cv.style.height = (state.ch*scale)+'px';
}

// ========== save ==========
let dirHandle=null;
async function linkFolder(){
  if(!window.showDirectoryPicker){
    setStatus('Open in Chrome on desktop to save files.','err');
    return false;
  }
  try{
    dirHandle=await window.showDirectoryPicker({mode:'readwrite'});
    document.getElementById('sdir').textContent=dirHandle.name;
    return true;
  } catch(e){ return false; }
}
function stamp(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
function basename(){
  const s=state;
  return `pxlg_${stamp()}_${s.mode}_${s.paletteMode}_${s.bg}_${s.n}x${s.n}_s${s.seed}`;
}
function compositeForExport(){
  const main=document.getElementById('cv');
  const out=document.createElement('canvas');
  out.width=main.width; out.height=main.height;
  const ctx=out.getContext('2d');
  ctx.fillStyle = (state && state.bg==='white') ? '#ffffff' : '#000000';
  ctx.fillRect(0,0,out.width,out.height);
  ctx.drawImage(main,0,0);
  return out;
}
async function savePng(){
  if(!dirHandle){const ok=await linkFolder();if(!ok)return}
  const out=compositeForExport();

  const name=basename()+'.png';

    const fh=await dirHandle.getFileHandle(name,{create:true});

  } catch(e){ setStatus(`save failed: ${e.message}`,'err') }
}
async function saveJson(){
  if(!dirHandle){const ok=await linkFolder();if(!ok)return}

    grid:{cols:s.cols,rows:s.rows,canvas:[s.cw,s.ch],margin:s.margin},
    patterns:s.patterns.map(p=>({bin:p.m,colors:p.grid})),

  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const name=basename()+'.json';
