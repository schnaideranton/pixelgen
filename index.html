<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>pixel gen · tools sa</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#0a0a0a;color:#e8e8e8;
  font-family:'JetBrains Mono','IBM Plex Mono',Menlo,monospace;font-size:11px;
  -webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}
/* One seamless dark surface — panel shares the app's background, no border,
   no separate scrollbar. Panel fills its column; when viewport is short or
   tall, its inner groups flow into 1–3 columns via auto-fit so everything
   fits in the frame without a panel-local scrollbar. */
.app{display:grid;grid-template-columns:clamp(280px,22vw,340px) 1fr;grid-template-areas:"panel stage";height:100vh;background:#0a0a0a}
.panel{
  grid-area:panel;
  background:transparent;
  padding:12px 14px;
  display:grid;
  grid-template-columns:1fr;
  grid-auto-rows:min-content;
  gap:10px 14px;
  align-content:start;
  overflow:hidden;
  min-height:0;
}
/* 2-column panel kicks in earlier so typical laptop viewports don't clip the
   tail of the panel. 3-column on very short viewports. */
@media (max-height: 980px) and (min-width: 880px){
  .app{grid-template-columns:minmax(420px,30vw) 1fr}
  .panel{grid-template-columns:1fr 1fr;gap:10px 14px}
  .panel .full{grid-column:1 / -1}
}
@media (max-height: 680px) and (min-width: 1200px){
  .app{grid-template-columns:minmax(540px,36vw) 1fr}
  .panel{grid-template-columns:1fr 1fr 1fr;gap:8px 12px}
  .panel .full{grid-column:1 / -1}
}
.stage{grid-area:stage;display:flex;flex-direction:column;overflow:hidden;background:transparent;min-width:0;min-height:0}
.panel h1{font-size:10px;margin:0 0 2px;letter-spacing:.2em;text-transform:uppercase;color:#999}
.panel .sub{font-size:9px;color:#555;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
.group{margin:0}
.group-label{font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:#666;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #1a1a1a}
.row{display:flex;align-items:center;gap:8px;margin-bottom:4px;min-height:22px}
.row>label{flex:1;color:#bbb;font-size:11px}
.row input[type=number]{background:#151515;color:#fff;border:1px solid #252525;padding:3px 6px;font-family:inherit;font-size:11px;width:72px;text-align:right}
.row input[type=number]:focus{outline:0;border-color:#555}
.row input[type=range]{flex:1.6;accent-color:#e8e8e8}
.row .val{color:#e8e8e8;width:30px;text-align:right;font-variant-numeric:tabular-nums;font-size:10px}
.seg{display:flex;gap:0;border:1px solid #252525;background:#0a0a0a}
.seg.vert{flex-direction:column}
.seg.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0}
.seg button{flex:1;background:transparent;border:0;color:#888;padding:5px 4px;font-family:inherit;font-size:10px;cursor:pointer;text-transform:lowercase;letter-spacing:.03em}
.seg button:hover{color:#fff;background:#1a1a1a}
.seg button.on{background:#e8e8e8;color:#000}
.seg.vert button{text-align:left;padding:5px 8px;border-top:1px solid #181818}
.seg.vert button:first-child{border-top:0}
.seg.grid2 button{text-align:left;padding:5px 8px;border-top:1px solid #181818;border-left:1px solid #181818;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seg.grid2 button:nth-child(-n+2){border-top:0}
.seg.grid2 button:nth-child(2n+1){border-left:0}
.save-group{margin-top:4px;padding-top:10px;border-top:1px solid #1a1a1a}
.save-group button{width:100%;background:transparent;border:1px solid #2a2a2a;color:#e8e8e8;padding:8px;font-family:inherit;font-size:10px;cursor:pointer;margin-bottom:6px;text-transform:uppercase;letter-spacing:.15em}
.save-group button:hover{background:#1a1a1a}
/* .full class lets title/save-group span both columns in 2-col layout */
.panel .panel-head{margin:0 0 2px}
.panel .panel-head + .sub{margin-bottom:6px}

.top{padding:14px 20px;border-bottom:1px solid #1a1a1a;color:#666;display:flex;gap:22px;font-size:10px;text-transform:uppercase;letter-spacing:.12em;align-items:center;flex-wrap:wrap}
.top .k{color:#555}
.top .v{color:#e8e8e8;margin-left:6px}
.top .right{margin-left:auto;display:flex;gap:22px;align-items:center}
.canvas-wrap{flex:1;overflow:auto;padding:32px;display:flex;align-items:center;justify-content:center;min-height:0}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;background:transparent}
.canvas-holder{position:relative;display:inline-block;line-height:0;background:var(--canvas-bg,#000);box-shadow:0 0 0 1px #1a1a1a;transition:transform .3s ease-out, box-shadow .3s ease-out}
.canvas-holder::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;z-index:3}
.primary-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px;border-top:1px solid #1a1a1a;background:#0a0a0a;flex-shrink:0}
.primary-bar button{background:#e8e8e8;color:#000;border:1px solid #e8e8e8;padding:11px;font-family:inherit;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:.18em;font-weight:600}
.primary-bar button.alt{background:transparent;color:#e8e8e8}
.primary-bar button:hover{background:#fff}
.primary-bar button.alt:hover{background:#1a1a1a;color:#fff}
.status{padding:8px 16px;border-top:1px solid #1a1a1a;color:#666;font-size:10px;letter-spacing:.06em;flex-shrink:0;min-height:26px}
.status.ok{color:#06ffa5}
.status.err{color:#ff006e}
.hint{color:#444;font-size:10px;margin-top:4px;line-height:1.5}
kbd{background:#1a1a1a;border:1px solid #2a2a2a;padding:1px 5px;font-size:9px;border-radius:2px;color:#aaa;font-family:inherit}
.enum-restart{display:block;width:100%;margin-top:6px;background:transparent;border:1px solid #2a2a2a;color:#e8e8e8;padding:7px;font-family:inherit;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.12em}
.enum-restart:hover{background:#1a1a1a}
.seg.grid2 button.full-span{grid-column:1 / -1;border-left:0;text-align:center}
.drop-zone{border:1px dashed #333;padding:7px 10px;color:#777;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;gap:8px;min-height:30px;margin-top:6px;transition:border-color .15s, color .15s}
.drop-zone:hover,.drop-zone.over{border-color:#06ffa5;color:#06ffa5}
.drop-zone .drop-thumb{width:32px;height:32px;object-fit:cover;border:1px solid #252525;flex:none;display:block}
.drop-zone .drop-info{flex:1;text-align:left;font-size:9px;color:#888;letter-spacing:.04em}
.drop-zone .drop-clear{background:transparent;border:1px solid #2a2a2a;color:#888;padding:3px 8px;font-family:inherit;font-size:10px;cursor:pointer;flex:none}
.drop-zone .drop-clear:hover{color:#fff;background:#1a1a1a}
canvas{cursor:pointer}
.save-flash{position:absolute;border:2px solid #06ffa5;box-shadow:0 0 16px rgba(6,255,165,.7), inset 0 0 12px rgba(6,255,165,.5);box-sizing:border-box;pointer-events:none;z-index:5;animation:saveflash .55s ease-out forwards}
@keyframes saveflash{0%{opacity:0;transform:scale(1)}30%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(1.02)}}

/* ==== autoplay + fullscreen ==== */
body.autoplaying #autoplay,body.autoplaying #fsAutoplay{background:#06ffa5;color:#000;border-color:#06ffa5}
.fs-overlay{position:fixed;bottom:20px;right:20px;display:none;gap:8px;z-index:100}
.fs-overlay button{background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.22);color:#fff;width:46px;height:46px;font-size:16px;cursor:pointer;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-radius:4px;font-family:inherit}
.fs-overlay button:hover{background:rgba(0,0,0,0.85)}
body.fs .fs-overlay{display:flex}
body.fs .panel,body.fs .top,body.fs .primary-bar,body.fs .status{display:none!important}
body.fs .app{display:block;height:100vh;width:100vw}
body.fs .stage{width:100vw;height:100vh;display:block}
body.fs .canvas-wrap{padding:0;max-height:none;min-height:100vh;height:100vh;width:100vw}

.canvas-wrap{position:relative}

/* ==== mobile-first responsive: canvas locked to a top square, everything
   else scrolls below ==== */
@media (max-width:820px){
  html,body{height:auto;overflow:visible}
  body{-webkit-overflow-scrolling:touch;overflow-x:hidden}
  .app{
    display:flex;flex-direction:column;height:auto;min-height:100vh;
  }
  .stage{order:1;flex:0 0 auto}
  .panel{order:2;border-right:0;border-top:1px solid #1f1f1f;padding:16px 14px calc(48px + env(safe-area-inset-bottom))}
  /* locked square work area — no jumping when generate changes canvas ratio.
     safe-area-inset-top accounts for iPhone notch so the top bar sits below it. */
  .canvas-wrap{
    width:100vw;height:100vw;
    max-height:none;min-height:0;
    padding:8px;flex:none;
    box-sizing:border-box;
  }
  .top{padding:calc(10px + env(safe-area-inset-top)) 14px 10px;font-size:9px;gap:12px}
  .top .right{display:none}
  .primary-bar{
    padding:10px 12px;gap:6px;
  }
  .primary-bar button{padding:12px 8px;font-size:10px;letter-spacing:.12em}
  .group-label{font-size:10px}
  .row>label{font-size:12px}
  .row input[type=number]{font-size:13px;padding:6px 8px;width:80px}
  .seg button{padding:8px 4px;font-size:11px}
  .save-group button{padding:11px;font-size:11px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="panel">
    <div class="full panel-head-wrap">
      <h1 class="panel-head">pixel gen</h1>
      <div class="sub">tools sa · v2</div>
    </div>

    <div class="group">
      <div class="group-label">canvas</div>
      <div class="row"><label>width</label><input type="number" id="cw" value="1600" step="100" min="200"></div>
      <div class="row"><label>height</label><input type="number" id="ch" value="1600" step="100" min="200"></div>
      <div class="row"><label>margin</label><input type="number" id="margin" value="40" min="0"></div>
      <div class="row"><label>bg</label>
        <div class="seg" id="bg" data-val="black" style="flex:1.6">
          <button data-v="black" class="on">black</button>
          <button data-v="white">white</button>
        </div>
      </div>
      <div class="row"><label>fit screen</label>
        <div class="seg" id="fit" data-val="1" style="flex:1.6">
          <button data-v="0">off</button>
          <button data-v="1" class="on">on</button>
        </div>
      </div>
      <div class="row"><label>layout</label>
        <div class="seg" id="layout" data-val="grid" style="flex:1.6">
          <button data-v="grid" class="on">grid</button>
          <button data-v="single">single · big</button>
        </div>
      </div>
    </div>

    <div class="group">
      <div class="group-label">pattern</div>
      <div class="row"><label>size</label>
        <div class="seg" id="psize" data-val="5" style="flex:1.6">
          <button data-v="3">3</button>
          <button data-v="4">4</button>
          <button data-v="5" class="on">5</button>
          <button data-v="6">6</button>
          <button data-v="7">7</button>
          <button data-v="8">8</button>
          <button data-v="9">9</button>
        </div>
      </div>
      <div class="row"><label>pixel scale</label><input type="number" id="pscale" value="10" min="2" max="40"></div>
      <div class="row"><label>spacing</label><input type="number" id="spacing" value="6" min="0"></div>
    </div>

    <div class="group">
      <div class="group-label">mode</div>
      <div class="seg grid2" id="mode" data-val="hybrid">
        <button data-v="random">random</button>
        <button data-v="hybrid" class="on">hybrid · all</button>
        <button data-v="h-sym">h-sym</button>
        <button data-v="v-sym">v-sym</button>
        <button data-v="quad">quad</button>
        <button data-v="radial">radial</button>
        <button data-v="emblem">emblem</button>
        <button data-v="glyph">glyph</button>
      </div>
    </div>

    <div class="group">
      <div class="group-label">density</div>
      <div class="row"><label>fill %</label><input type="range" id="fill" min="10" max="85" value="42"><span class="val" id="fillv">42</span></div>
    </div>

    <div class="group">
      <div class="group-label">color</div>
      <div class="seg grid2" id="palette" data-val="neon">
        <button data-v="mono">mono</button>
        <button data-v="grays">grays · px</button>
        <button data-v="random">random rgb</button>
        <button data-v="chaos">chaos · px</button>
        <button data-v="neon" class="on">neon</button>
        <button data-v="retro">retro</button>
        <button data-v="pastel">pastel</button>
        <button data-v="acid">acid</button>
        <button data-v="crt">crt green</button>
        <button data-v="warm">warm earth</button>
        <button data-v="image" class="full-span">image · from drop ↓</button>
      </div>
      <div id="imgdrop" class="drop-zone">
        <span>drop image · or click to pick</span>
        <input type="file" accept="image/*" hidden>
      </div>
      <div class="row" style="margin-top:8px"><label>colors / symbol</label>
        <div class="seg" id="mcol" data-val="2" style="flex:1.6">
          <button data-v="1">1</button>
          <button data-v="2" class="on">2</button>
          <button data-v="3">3</button>
          <button data-v="4">4</button>
          <button data-v="5">5</button>
          <button data-v="6">6</button>
          <button data-v="7">7</button>
          <button data-v="8">8</button>
        </div>
      </div>
    </div>

    <div class="group">
      <div class="group-label">rounding</div>
      <div class="row"><label>outer round</label>
        <div class="seg" id="outer" data-val="0" style="flex:1.2">
          <button data-v="0" class="on">off</button>
          <button data-v="1">on</button>
        </div>
      </div>
      <div class="row"><label>inner round</label>
        <div class="seg" id="inner" data-val="0" style="flex:1.2">
          <button data-v="0" class="on">off</button>
          <button data-v="1">on</button>

    <div class="group">

      <div class="row"><label>jump to</label>
        <input type="range" id="enumslider" min="0" max="10000" value="0" style="flex:1.6;accent-color:#06ffa5">

      <div class="row"><label>seed · 0=auto</label><input type="number" id="seed" value="0" step="1"></div>
      <button id="enumrestart" class="enum-restart">↻ restart sweep</button>
    </div>

    <div class="group">
      <div class="group-label">playback</div>
      <div class="row"><label>source</label>
        <div class="seg" id="autosrc" data-val="fixed" style="flex:1.6">
          <button data-v="fixed" class="on">fixed</button>
          <button data-v="morph">morph</button>
          <button data-v="wild">wild</button>
        </div>
      </div>
      <div class="row"><label>speed</label>

<div class="fs-overlay">
  <button id="fsAutoplay" title="toggle autoplay">▶</button>
  <button id="fsExit" title="exit fullscreen">⛶</button>
</div>

<script>
// ========== rng ==========
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
let rand = mulberry32(1);
const R = () => rand();
const RI = n => Math.floor(rand()*n);
const pick = a => a[RI(a.length)];

// ========== palettes ==========
const PALETTES = {
  neon:   ['#ff006e','#fb5607','#ffbe0b','#8338ec','#3a86ff','#06ffa5','#ff14c6'],
  retro:  ['#e63946','#f1c40f','#a8dadc','#457b9d','#e76f51','#2a9d8f','#ffb703'],
  pastel: ['#ffadad','#ffd6a5','#fdffb6','#caffbf','#9bf6ff','#a0c4ff','#bdb2ff','#ffc6ff'],
  acid:   ['#39ff14','#ff10f0','#fffb00','#00ffff','#ff3131','#c8ff00','#aaff00'],
  crt:    ['#00ff41','#70ff80','#008f11','#b6ffb6','#c5fcbe'],
  warm:   ['#d4a373','#e9c46a','#f4a261','#e76f51','#bc6c25','#dda15e','#606c38'],
};
function randHSL(){const h=RI(360),s=55+RI(40),l=45+RI(35);return`hsl(${h} ${s}% ${l}%)`}
function getPalette(mode,bg){
  if(mode==='mono') return [bg==='black'?'#ffffff':'#000000'];
  if(mode==='random'||mode==='chaos'||mode==='grays'||mode==='image') return null;
  return PALETTES[mode];
}
let imagePalette = null;

// ========== pattern generators ==========
const empty = n => Array.from({length:n},()=>Array(n).fill(0));

function genRandom(n,p){
  const m=empty(n);
  for(let y=0;y<n;y++)for(let x=0;x<n;x++)m[y][x]=R()<p?1:0;
  return m;
}
function genHSym(n,p){
  const m=empty(n),half=Math.ceil(n/2);
  for(let y=0;y<n;y++)for(let x=0;x<half;x++){const v=R()<p?1:0;m[y][x]=v;m[y][n-1-x]=v}
  return m;
}
function genVSym(n,p){
  const m=empty(n),half=Math.ceil(n/2);
  for(let y=0;y<half;y++)for(let x=0;x<n;x++){const v=R()<p?1:0;m[y][x]=v;m[n-1-y][x]=v}
  return m;
}
function genQuad(n,p){
  const m=empty(n),h=Math.ceil(n/2);
  for(let y=0;y<h;y++)for(let x=0;x<h;x++){
    const v=R()<p?1:0;
    m[y][x]=v;m[y][n-1-x]=v;m[n-1-y][x]=v;m[n-1-y][n-1-x]=v;
  }
  return m;
}
// radial rosette — full dihedral D4: 4-fold rotation combined with diagonal mirror.
// the aesthetic target is snowflake / flower / compass rose, which require the
// mirror axis to read correctly — without it the shape becomes a pinwheel, which
// is not what "rosette" visually means.
function genRadial(n,p){
  const m=empty(n),h=Math.ceil(n/2);
  // iterate only the octant x >= y — D4's fundamental domain —
  // so each orbit is rolled once regardless of whether n is even or odd.
  for(let y=0;y<h;y++)for(let x=y;x<h;x++){
    if(R()>=p) continue;
    m[y][x]=1;
    m[x][n-1-y]=1;
    m[n-1-y][n-1-x]=1;
    m[n-1-x][y]=1;
    m[x][y]=1;
    m[y][n-1-x]=1;
    m[n-1-x][n-1-y]=1;
    m[n-1-y][x]=1;
  }
  return m;
}
function genEmblem(n,p){
  const m=empty(n),c=Math.floor(n/2),h=Math.ceil(n/2);
  const maxD=Math.sqrt(2)*c;
  for(let y=0;y<h;y++)for(let x=0;x<h;x++){
    const dx=c-x,dy=c-y,d=Math.sqrt(dx*dx+dy*dy);
    const w=1-d/(maxD+.001);
    const prob=p*(0.35+1.1*w);
    const v=R()<prob?1:0;
    m[y][x]=v;m[y][n-1-x]=v;m[n-1-y][x]=v;m[n-1-y][n-1-x]=v;
  }
  if(n%2===1) m[c][c]=1;
  return m;
}
function genGlyph(n,p){
  const m=empty(n),c=Math.floor(n/2);
  const ops=['vline','hline','diag','antidiag','dot','cross','corner','frame','halfframe','lshape','plus','ring'];
  const count=1+RI(3);
  const useSym=R()<0.7;
  const sym=pick(['h','v','quad','none']);
  const put=(x,y)=>{
    if(x<0||x>=n||y<0||y>=n)return;
    m[y][x]=1;
    if(useSym){
      if(sym==='h'||sym==='quad') m[y][n-1-x]=1;
      if(sym==='v'||sym==='quad') m[n-1-y][x]=1;
      if(sym==='quad') m[n-1-y][n-1-x]=1;
    }
  };
  for(let k=0;k<count;k++){
    const op=pick(ops);
    if(op==='vline'){const x=RI(n);for(let y=0;y<n;y++)put(x,y)}
    else if(op==='hline'){const y=RI(n);for(let x=0;x<n;x++)put(x,y)}
    else if(op==='diag'){for(let i=0;i<n;i++)put(i,i)}
    else if(op==='antidiag'){for(let i=0;i<n;i++)put(i,n-1-i)}
    else if(op==='dot'){put(RI(n),RI(n));put(RI(n),RI(n))}
    else if(op==='cross'){for(let i=0;i<n;i++){put(c,i);put(i,c)}}
    else if(op==='plus'){put(c,c);put(c-1,c);put(c+1,c);put(c,c-1);put(c,c+1)}
    else if(op==='corner'){put(0,0);put(1,0);put(0,1)}
    else if(op==='frame'){for(let i=0;i<n;i++){put(i,0);put(i,n-1);put(0,i);put(n-1,i)}}
    else if(op==='halfframe'){for(let i=0;i<n;i++){put(i,0);put(0,i)}}
    else if(op==='lshape'){for(let i=0;i<n;i++){put(0,i);put(i,n-1)}}
    else if(op==='ring'){for(let i=1;i<n-1;i++){put(i,1);put(i,n-2);put(1,i);put(n-2,i)}}
  }
  if(R()<0.25){
    for(let y=0;y<n;y++)for(let x=0;x<n;x++){if(m[y][x]&&R()<0.15)m[y][x]=0}
  }
  return m;
}

const MODES={
  random:genRandom,'h-sym':genHSym,'v-sym':genVSym,
  quad:genQuad,radial:genRadial,emblem:genEmblem,glyph:genGlyph,
};
// hybrid bag favors mirror-based modes because mirror symmetry reads as "language" —
// most world alphabets and emblems are mirror-symmetric, not rotational.
const HYBRID_BAG = ['h-sym','h-sym','v-sym','v-sym','quad','quad','quad','emblem','emblem','glyph','glyph','glyph','radial','random','random'];

function density(m){let c=0;const n=m.length;for(const r of m)for(const v of r)if(v)c++;return c/(n*n)}

function genPattern(mode,n,fillPct){
  const p=fillPct/100;
  const fn = mode==='hybrid' ? MODES[pick(HYBRID_BAG)] : MODES[mode];
  let best=null,bestScore=-Infinity;
  for(let i=0;i<8;i++){
    const m=fn(n,p);
    const d=density(m);
    if(d>=0.2&&d<=0.65) return m;
    const score = -(Math.max(0,0.2-d)+Math.max(0,d-0.65));
    if(score>bestScore){bestScore=score;best=m}
  }
  return best;
}
function patHash(m){let s='';for(const r of m)s+=r.join('');return s}

// ========== color ==========
function findClusters(m){
  const n=m.length,seen=Array.from({length:n},()=>Array(n).fill(false)),out=[];
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    if(m[y][x]&&!seen[y][x]){
      const stk=[[y,x]],cells=[];
      while(stk.length){
        const [yy,xx]=stk.pop();
        if(yy<0||yy>=n||xx<0||xx>=n)continue;
        if(seen[yy][xx]||!m[yy][xx])continue;
        seen[yy][xx]=true;cells.push([yy,xx]);
        stk.push([yy+1,xx],[yy-1,xx],[yy,xx+1],[yy,xx-1]);
      }
      out.push(cells);
    }
  }
  return out;
}

function colorize(m,palette,maxColors,bg,paletteMode){
  const n=m.length;
  const g=Array.from({length:n},()=>Array(n).fill(null));

  // chaos mode: every active cell gets its own hue, no clustering
  if(paletteMode==='chaos'){
    for(let y=0;y<n;y++)for(let x=0;x<n;x++){
      if(m[y][x]) g[y][x]=randHSL();
    }
    return g;
  }
  // image mode: sample per-pixel from the dropped image's colour pool.
  // the pool is a flat array of ~4K raw pixel samples, so picking uniformly
  // naturally reproduces the image's colour proportions.
  if(paletteMode==='image' && imagePalette && imagePalette.length>0){
    for(let y=0;y<n;y++)for(let x=0;x<n;x++){
      if(m[y][x]) g[y][x] = imagePalette[RI(imagePalette.length)];
    }
    return g;
  }
  // grays mode: per-pixel random gray shade, kept contrasting against bg
  if(paletteMode==='grays'){
    const lmin = bg==='black' ? 42 : 0;
    for(let y=0;y<n;y++)for(let x=0;x<n;x++){
      if(m[y][x]){
        const l = lmin + RI(58);
        g[y][x]=`hsl(0 0% ${l}%)`;
      }
    }
    return g;
  }

  // exact colour count per symbol (not "up to N"). Round-robin through clusters
  // so every requested colour appears at least once whenever clusters ≥ colours.
  const c = Math.max(1, maxColors);
  let colors;
  if(palette===null){
    colors=[]; for(let i=0;i<c;i++) colors.push(randHSL());
  } else {
    const sh=[...palette].sort(()=>R()-.5);
    colors=[]; for(let i=0;i<c;i++) colors.push(sh[i % sh.length]);
  }
  const clusters=findClusters(m);
  const shuf=[...colors].sort(()=>R()-.5);
  clusters.forEach((cells,i)=>{
    const col = shuf[i % shuf.length];
    for(const [y,x] of cells) g[y][x] = col;
  });
  return g;
}

// ========== enumeration ==========
// Sweep all binary patterns inside a mode's fundamental domain, ordered
// by popcount (sparse → dense), then lex within each popcount level.
function binomial(n,k){
  if(k<0||k>n) return 0;
  if(k===0||k===n) return 1;
  k=Math.min(k,n-k);
  let r=1;
  for(let i=0;i<k;i++) r = r*(n-i)/(i+1);
  return r;
}
function lexNthComb(m,k,rank){
  const r=[];
  let start=0,kr=k,idx=rank;
  while(kr>0){
    for(let i=start;i<m;i++){
      const c=binomial(m-1-i,kr-1);
      if(idx<c){r.push(i);start=i+1;kr--;break}
      idx-=c;
    }
  }
  return r;
}
function enumNthSubset(m,globalIdx){
  let cum=0;
  for(let k=0;k<=m;k++){
    const c=binomial(m,k);
    if(globalIdx<cum+c) return {k, subset:lexNthComb(m,k,globalIdx-cum)};
    cum+=c;
  }
  return {k:m+1, subset:[]};
}
function enumTotalForM(m){
  if(m>45) return Infinity;
  return Math.pow(2,m);
}
function fdomainMode(mode){
  switch(mode){
    case 'h-sym': return 'hsym';
    case 'v-sym': return 'vsym';
    case 'quad':  return 'quad';
    case 'emblem':return 'quad';
    case 'radial':return 'radial';
    default:      return 'none';
  }
}
function fdomainCells(fdMode,n){
  const cells=[],h=Math.ceil(n/2);
  if(fdMode==='hsym'){ for(let y=0;y<n;y++) for(let x=0;x<h;x++) cells.push([y,x]); }
  else if(fdMode==='vsym'){ for(let y=0;y<h;y++) for(let x=0;x<n;x++) cells.push([y,x]); }
  else if(fdMode==='quad'){ for(let y=0;y<h;y++) for(let x=0;x<h;x++) cells.push([y,x]); }
  else if(fdMode==='radial'){ for(let y=0;y<h;y++) for(let x=y;x<h;x++) cells.push([y,x]); }
  else { for(let y=0;y<n;y++) for(let x=0;x<n;x++) cells.push([y,x]); }
  return cells;
}
function expandFd(fdMode,n,subset,cells){
  const m=Array.from({length:n},()=>Array(n).fill(0));
  for(const idx of subset){
    const [y,x]=cells[idx];
    if(fdMode==='none'){ m[y][x]=1; }
    else if(fdMode==='hsym'){ m[y][x]=1; m[y][n-1-x]=1; }
    else if(fdMode==='vsym'){ m[y][x]=1; m[n-1-y][x]=1; }
    else if(fdMode==='quad'){ m[y][x]=1; m[y][n-1-x]=1; m[n-1-y][x]=1; m[n-1-y][n-1-x]=1; }
    else if(fdMode==='radial'){
      m[y][x]=1; m[x][n-1-y]=1; m[n-1-y][n-1-x]=1; m[n-1-x][y]=1;
      m[x][y]=1; m[y][n-1-x]=1; m[n-1-x][n-1-y]=1; m[n-1-y][x]=1;
    }
  }
  return m;
}
let enumCursor=0, enumKey='';
function enumKeyOf(mode,n){ return `${n}|${fdomainMode(mode)}`; }

// ========== state ==========
let state=null;
const getVal = id => document.getElementById(id).dataset.val;
const getNum = id => +document.getElementById(id).value;
function setSeg(id, val){
  const seg=document.getElementById(id);
  seg.dataset.val=String(val);
  seg.querySelectorAll('button').forEach(b=>{
    b.classList.toggle('on', b.dataset.v===String(val));
  });
}
function setNum(id, val){ document.getElementById(id).value = val; }

function generate(){
  let cw, ch;
  if(getVal('fit')==='1'){
    const wrap=document.querySelector('.canvas-wrap');
    const wW = wrap.clientWidth || window.innerWidth;
    const wH = wrap.clientHeight || Math.max(400, window.innerHeight*0.6);
    cw = Math.max(240, Math.floor(wW - 16));
    ch = Math.max(240, Math.floor(wH - 16));
    setNum('cw', cw); setNum('ch', ch);
  } else {
    cw=getNum('cw'); ch=getNum('ch');
  }
  const margin=getNum('margin');
  const bg=getVal('bg');
  const n=+getVal('psize'),pscale=getNum('pscale'),spacing=getNum('spacing');
  const mode=getVal('mode');
  const fill=getNum('fill');
  const paletteMode=getVal('palette');
  const maxColors=+getVal('mcol');
  const dedup=getVal('dedup')==='1';
  let seed=getNum('seed');
  if(seed===0) seed=Math.floor(Math.random()*1e9);
  rand=mulberry32(seed);

  const layout=getVal('layout');
  let cols, rows, effPscale, effSpacing, offsetX, offsetY;
  if(layout==='single'){
    // one pattern — scale up to fill the canvas, centered, respecting margin
    const avail=Math.max(n*2, Math.min(cw-2*margin, ch-2*margin));
    effPscale=Math.max(2, Math.floor(avail/n));
    effSpacing=0;
    cols=1; rows=1;
    const blockS=n*effPscale;
    offsetX=(cw-blockS)/2;
    offsetY=(ch-blockS)/2;
  } else {
    effPscale=pscale;
    effSpacing=spacing;
    const block=n*effPscale, stride=block+effSpacing;
    cols=Math.max(1,Math.floor((cw-2*margin+effSpacing)/stride));
    rows=Math.max(1,Math.floor((ch-2*margin+effSpacing)/stride));
    // centre the grid within the canvas — even leftover paddings on all sides
    const gridW=cols*stride-effSpacing;
    const gridH=rows*stride-effSpacing;
    offsetX=(cw-gridW)/2;
    offsetY=(ch-gridH)/2;
  }
  const total=cols*rows;

  const palette=getPalette(paletteMode,bg);
  const enumOn = getVal('enum')==='1';
  const patterns=[];
  let enumInfo=null;

  if(enumOn){
    // enum sweep — systematic, deterministic
    const fdMode = fdomainMode(mode);
    const cells = fdomainCells(fdMode, n);
    const fdSize = cells.length;
    const fullTotal = enumTotalForM(fdSize);
    const key = enumKeyOf(mode, n);
    if(key !== enumKey){ enumCursor=0; enumKey=key; }
    const startCursor = enumCursor;
    let firstK=null, lastK=0;
    for(let i=0;i<total;i++){
      const raw = startCursor + i;
      const idx = isFinite(fullTotal) ? (raw % fullTotal) : raw;
      const {k, subset} = enumNthSubset(fdSize, idx);
      if(firstK===null) firstK=k;
      lastK=k;
      const matrix = expandFd(fdMode, n, subset, cells);
      // deterministic per-pattern rng so coloured palettes don't flicker between renders
      rand = mulberry32((idx + 1) * 2654435761 | 0);
      patterns.push({m:matrix, grid:colorize(matrix, palette, maxColors, bg, paletteMode)});
    }
    enumCursor = startCursor + total;
    if(isFinite(fullTotal) && enumCursor >= fullTotal) enumCursor = enumCursor % fullTotal;
    enumInfo = {fdMode, fdSize, fullTotal, startCursor, firstK, lastK};
    rand = mulberry32(seed); // restore for anything else
  } else {
    const hashes=new Set();
    const maxTries=total*25; let tries=0;
    while(patterns.length<total && tries<maxTries){
      tries++;
      const m=genPattern(mode,n,fill);
      const h=patHash(m);
      if(dedup && hashes.has(h)) continue;
      hashes.add(h);
      patterns.push({m,grid:colorize(m,palette,maxColors,bg,paletteMode)});
    }
    while(patterns.length<total){
      const m=genPattern(mode,n,fill);
      patterns.push({m,grid:colorize(m,palette,maxColors,bg,paletteMode)});
    }
  }

  const outerRound = getVal('outer')==='1';
  const innerRound = getVal('inner')==='1';
  state={cw,ch,margin,bg,n,pscale:effPscale,spacing:effSpacing,layout,offsetX,offsetY,mode,fill,paletteMode,maxColors,cols,rows,patterns,seed,enumInfo,outerRound,innerRound};
  render();
  document.getElementById('sgrid').textContent=`${cols}×${rows}`;
  document.getElementById('spatt').textContent=patterns.length;
  document.getElementById('sseed').textContent=enumOn ? '—' : seed;
  if(enumOn && enumInfo){
    const t = isFinite(enumInfo.fullTotal) ? enumInfo.fullTotal.toLocaleString() : '∞';
    const kRange = enumInfo.firstK===enumInfo.lastK ? `k=${enumInfo.firstK}` : `k=${enumInfo.firstK}..${enumInfo.lastK}`;
    setStatus(`enum · ${enumInfo.startCursor.toLocaleString()}→${(enumInfo.startCursor+total-1).toLocaleString()} / ${t} · ${kRange} · ${enumInfo.fdMode}`);
    syncEnumSlider(enumInfo);
  } else {
    setStatus(`${patterns.length} symbols · ${mode} · ${paletteMode} · seed ${seed}`);
  }
}

function syncEnumSlider(info){
  const sl = document.getElementById('enumslider');
  const lbl = document.getElementById('enumpos');
  if(!sl || !lbl) return;
  if(isFinite(info.fullTotal) && info.fullTotal > 0){
    const frac = info.startCursor / info.fullTotal;
    // don't fight a drag-in-progress — only update if slider isn't the source
    if(!sl.matches(':active')) sl.value = Math.round(frac * 10000);
    lbl.textContent = `${(frac*100).toFixed(1)}%`;
  } else {
    lbl.textContent = `${info.startCursor.toLocaleString()}`;
  }
}

function generateWild(){
  // full-random: every parameter shuffles.
  // inside one canvas the pattern size is uniform (psize is a single setting),
  // and mode is always hybrid so all seven families mix across the grid.
  const ri = n => Math.floor(Math.random()*n);
  const p = a => a[ri(a.length)];

  // bg biased black
  setSeg('bg', p(['black','black','black','white']));

  // pattern size: any integer from 3 to 9, slight bias to 5
  const pSize = p([3,4,5,5,5,6,7,7,8,9]);
  setSeg('psize', pSize);
  const pScale = 4 + ri(18);
  setNum('pscale', pScale);
  const block = pSize * pScale;

  // spacing floor = ⌈block / 3⌉ (abs. min 3 px), ceiling ~60% of block size —
  // so gaps always read clearly regardless of how big or small the block is
  const minSp = Math.max(3, Math.ceil(block / 3));
  const maxSp = Math.max(minSp + 4, Math.ceil(block * 0.6));
  const sp = minSp + ri(maxSp - minSp + 1);
  setNum('spacing', sp);
  setNum('margin', ri(80));

  // hybrid mode mixes all seven families inside one canvas
  setSeg('mode', 'hybrid');

  // ~1/3 of generations land in the b&w bucket (binary mono or gradient grays),
  // the remaining 2/3 span the colour library
  const bw = Math.random() < 1/3;
  const palette = bw
    ? p(['mono','grays','grays'])
    : p(['random','chaos','neon','retro','pastel','acid','crt','warm']);
  setSeg('palette', palette);

  const fill = 22 + ri(55);
  setNum('fill', fill);
  document.getElementById('fillv').textContent = fill;
  setSeg('mcol', p([1,2,2,3,3,4,4,5,6,7,8]));
  setSeg('dedup', p(['1','1','0']));
  setSeg('enum', '0');
  updateEnumUI();
  setNum('seed', 0);
  generate();
}

// ========== corner rounding ==========
// outer: active pixel's convex corner (both ortho neighbours empty) → round off
// inner: empty cell's concave corner (both ortho neighbours active) → fillet grows
if(typeof CanvasRenderingContext2D!=='undefined' && !CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,rad){
    const [tl,tr,br,bl] = Array.isArray(rad) ? rad : [rad,rad,rad,rad];
    this.moveTo(x+tl,y);
    this.lineTo(x+w-tr,y);
    if(tr) this.arcTo(x+w,y,x+w,y+tr,tr);
    this.lineTo(x+w,y+h-br);
    if(br) this.arcTo(x+w,y+h,x+w-br,y+h,br);
    this.lineTo(x+bl,y+h);
    if(bl) this.arcTo(x,y+h,x,y+h-bl,bl);
    this.lineTo(x,y+tl);
    if(tl) this.arcTo(x,y,x+tl,y,tl);
  };
}
function filletTL(ctx,px,py,r,col){
  ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(px,py); ctx.lineTo(px+r,py);
  ctx.arc(px+r,py+r,r,-Math.PI/2,Math.PI,true);
  ctx.closePath(); ctx.fill();
}
function filletTR(ctx,px,py,z,r,col){
  ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(px+z,py); ctx.lineTo(px+z-r,py);
  ctx.arc(px+z-r,py+r,r,-Math.PI/2,0,false);
  ctx.closePath(); ctx.fill();
}
function filletBL(ctx,px,py,z,r,col){
  ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(px,py+z); ctx.lineTo(px+r,py+z);
  ctx.arc(px+r,py+z-r,r,Math.PI/2,Math.PI,false);
  ctx.closePath(); ctx.fill();
}
function filletBR(ctx,px,py,z,r,col){
  ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(px+z,py+z); ctx.lineTo(px+z-r,py+z);
  ctx.arc(px+z-r,py+z-r,r,Math.PI/2,0,true);
  ctx.closePath(); ctx.fill();
}
function drawPatternToCtx(ctx, M, G, n, z, x0, y0, opts){
  const r = z/2;
  const outer = opts && opts.outer;
  const inner = opts && opts.inner;
  for(let y=0;y<n;y++) for(let x=0;x<n;x++){
    const col = G[y][x]; if(!col) continue;
    const px = x0 + x*z, py = y0 + y*z;
    if(outer){
      const topE  = y===0   || !M[y-1][x];
      const botE  = y===n-1 || !M[y+1][x];
      const leftE = x===0   || !M[y][x-1];
      const rightE= x===n-1 || !M[y][x+1];
      // if the diagonal neighbour is active, this corner touches another pixel
      // at the vertex — keep it square so the two shapes meet cleanly instead
      // of both arc-ing away and leaving a bg triangle between them.
      const diagTL = y>0   && x>0   && M[y-1][x-1];
      const diagTR = y>0   && x<n-1 && M[y-1][x+1];
      const diagBL = y<n-1 && x>0   && M[y+1][x-1];
      const diagBR = y<n-1 && x<n-1 && M[y+1][x+1];
      const tl = (topE && leftE  && !diagTL) ? r : 0;
      const tr = (topE && rightE && !diagTR) ? r : 0;
      const br = (botE && rightE && !diagBR) ? r : 0;
      const bl = (botE && leftE  && !diagBL) ? r : 0;
      ctx.fillStyle=col; ctx.beginPath();
      ctx.roundRect(px, py, z, z, [tl, tr, br, bl]);
      ctx.fill();
    } else {
      ctx.fillStyle=col;
      ctx.fillRect(px, py, z, z);
    }
  }
  if(inner){
    for(let y=0;y<n;y++) for(let x=0;x<n;x++){
      if(M[y][x]) continue;
      const px = x0 + x*z, py = y0 + y*z;
      if(y>0 && x>0     && M[y-1][x] && M[y][x-1]) filletTL(ctx, px, py, r,   G[y-1][x] || G[y][x-1]);
      if(y>0 && x<n-1   && M[y-1][x] && M[y][x+1]) filletTR(ctx, px, py, z, r, G[y-1][x] || G[y][x+1]);
      if(y<n-1 && x>0   && M[y+1][x] && M[y][x-1]) filletBL(ctx, px, py, z, r, G[y+1][x] || G[y][x-1]);
      if(y<n-1 && x<n-1 && M[y+1][x] && M[y][x+1]) filletBR(ctx, px, py, z, r, G[y+1][x] || G[y][x+1]);
    }
  }
}

function render(){
  const s=state,cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  cv.width=s.cw;cv.height=s.ch;
  // canvas bitmap stays transparent; bg is painted by .canvas-holder via CSS var
  document.body.style.setProperty('--canvas-bg', s.bg==='black'?'#000':'#fff');
  ctx.clearRect(0,0,s.cw,s.ch);
  const stride=s.n*s.pscale+s.spacing;
  const opts={outer:s.outerRound, inner:s.innerRound};
  let i=0;
  for(let rr=0;rr<s.rows;rr++)for(let c=0;c<s.cols;c++){
    const p=s.patterns[i++];
    const x0=s.offsetX+c*stride, y0=s.offsetY+rr*stride;
    drawPatternToCtx(ctx, p.m, p.grid, s.n, s.pscale, x0, y0, opts);
  }
  fitCanvas();
}

function fitCanvas(){
  if(!state) return;
  const cv=document.getElementById('cv');
  const wrap=document.querySelector('.canvas-wrap');
  // fallback to viewport size if wrap has no measured box yet (mobile webview race)
  const wAvail = Math.max(120, (wrap.clientWidth || window.innerWidth) - 24);
  const hAvail = Math.max(120, (wrap.clientHeight || window.innerHeight * 0.5) - 24);
  const scale = Math.min(1, wAvail/state.cw, hAvail/state.ch);
  cv.style.width = (state.cw*scale)+'px';
  cv.style.height = (state.ch*scale)+'px';
}

// ========== save ==========
let dirHandle=null;
async function linkFolder(){
  if(!window.showDirectoryPicker){
    setStatus('Попробуй открыть на десктопе в браузере Chrome, чтобы это работало.','err');
    return false;
  }
  try{
    dirHandle=await window.showDirectoryPicker({mode:'readwrite'});
    document.getElementById('sdir').textContent=dirHandle.name;
    return true;
  } catch(e){ return false; }
}
function stamp(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
function basename(){
  const s=state;
  return `pxlg_${stamp()}_${s.mode}_${s.paletteMode}_${s.bg}_${s.n}x${s.n}_s${s.seed}`;
}
function compositeForExport(){
  const main=document.getElementById('cv');
  const out=document.createElement('canvas');
  out.width=main.width; out.height=main.height;
  const ctx=out.getContext('2d');
  ctx.fillStyle = (state && state.bg==='white') ? '#ffffff' : '#000000';
  ctx.fillRect(0,0,out.width,out.height);
  ctx.drawImage(main,0,0);
  return out;
}
async function savePng(){
  if(!dirHandle){const ok=await linkFolder();if(!ok)return}
  const out=compositeForExport();
  const blob=await new Promise(r=>out.toBlob(r,'image/png'));
  const name=basename()+'.png';
  try{
    const fh=await dirHandle.getFileHandle(name,{create:true});
    const w=await fh.createWritable();await w.write(blob);await w.close();
    setStatus(`saved → ${name}`,'ok');
  } catch(e){ setStatus(`save failed: ${e.message}`,'err') }
}
async function saveJson(){
  if(!dirHandle){const ok=await linkFolder();if(!ok)return}
  const s=state;
  const data={
    tool:'pixel gen v2', created:new Date().toISOString(),
    seed:s.seed, mode:s.mode, palette:s.paletteMode, bg:s.bg,
    n:s.n, pscale:s.pscale, spacing:s.spacing, fill:s.fill, maxColors:s.maxColors,
    grid:{cols:s.cols,rows:s.rows,canvas:[s.cw,s.ch],margin:s.margin},
    patterns:s.patterns.map(p=>({bin:p.m,colors:p.grid})),
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const name=basename()+'.json';
  try{
    const fh=await dirHandle.getFileHandle(name,{create:true});
    const w=await fh.createWritable();await w.write(blob);await w.close();
    setStatus(`saved → ${name}`,'ok');
  } catch(e){ setStatus(`save failed: ${e.message}`,'err') }
}
// render one pattern onto a fresh PNG for click-to-save, with a 2-cell bg
// margin on every side so the symbol breathes (5×5 → 9×9 output grid, etc.)
function renderSinglePattern(p, n, bg, opts){
  const pad = 2;
  const outCells = n + pad*2;
  const target = 1000;
  const zoom = Math.max(10, Math.floor(target / outCells));
  const size = outCells * zoom;
  const out = document.createElement('canvas');
  out.width = size; out.height = size;
  const ctx = out.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = bg==='white' ? '#ffffff' : '#000000';
  ctx.fillRect(0, 0, size, size);
  drawPatternToCtx(ctx, p.m, p.grid, n, zoom, pad*zoom, pad*zoom, opts);
  return out;
}
async function savePatternAt(idx){
  if(!state || !state.patterns || !state.patterns[idx]) return;
  const s = state, p = s.patterns[idx];
  if(!dirHandle){ const ok=await linkFolder(); if(!ok) return; }
  const out = renderSinglePattern(p, s.n, s.bg, {outer:s.outerRound, inner:s.innerRound});
  const row = Math.floor(idx / s.cols);
  const col = idx % s.cols;
  const name = `pxlg_sym_${stamp()}_${s.mode}_${s.paletteMode}_${s.n}x${s.n}_r${row}c${col}.png`;
  try{
    const blob = await new Promise(r=>out.toBlob(r,'image/png'));
    const fh = await dirHandle.getFileHandle(name,{create:true});
    const w = await fh.createWritable();
    await w.write(blob); await w.close();
    setStatus(`saved symbol → ${name}`,'ok');
    flashSaved(idx);
  } catch(e){ setStatus(`save failed: ${e.message}`,'err'); }
}
function flashSaved(idx){
  if(!state) return;
  const s = state;
  const row = Math.floor(idx / s.cols);
  const col = idx % s.cols;
  const stride = s.n * s.pscale + s.spacing;
  const blockSize = s.n * s.pscale;
  const bx = s.offsetX + col * stride;
  const by = s.offsetY + row * stride;
  const cv = document.getElementById('cv');
  const ratio = cv.clientWidth / cv.width;  // css px per bitmap px
  const holder = document.querySelector('.canvas-holder');
  const flash = document.createElement('div');
  flash.className = 'save-flash';
  flash.style.left = (bx * ratio) + 'px';
  flash.style.top  = (by * ratio) + 'px';
  flash.style.width  = (blockSize * ratio) + 'px';
  flash.style.height = (blockSize * ratio) + 'px';
  holder.appendChild(flash);
  setTimeout(()=>flash.remove(), 600);
}

function downloadPng(){
  const out=compositeForExport();
  out.toBlob(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=basename()+'.png';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    setStatus('downloaded to ~/Downloads','ok');
  },'image/png');
}
function setStatus(msg,cls){
  const el=document.getElementById('status');
  el.textContent=msg; el.className='status '+(cls||'');
}

// ========== morph ==========
// per-tick mutation: flip 1–2 cells in the fundamental domain, let symmetry
// redistribute, and inherit colour from neighbours so the palette drifts
// rather than flickers.
function getOrbit(fdMode, n, y, x){
  if(fdMode==='hsym')  return [[y,x],[y,n-1-x]];
  if(fdMode==='vsym')  return [[y,x],[n-1-y,x]];
  if(fdMode==='quad')  return [[y,x],[y,n-1-x],[n-1-y,x],[n-1-y,n-1-x]];
  if(fdMode==='radial')return [[y,x],[x,n-1-y],[n-1-y,n-1-x],[n-1-x,y],[x,y],[y,n-1-x],[n-1-x,n-1-y],[n-1-y,x]];
  return [[y,x]];
}
function morphPick(paletteMode, palette, bg, neighbour){
  if(neighbour) return neighbour;
  if(paletteMode==='chaos'){
    const h=Math.floor(Math.random()*360), s=55+Math.floor(Math.random()*40), l=45+Math.floor(Math.random()*35);
    return `hsl(${h} ${s}% ${l}%)`;
  }
  if(paletteMode==='grays'){
    const lmin = bg==='black'?42:0;
    return `hsl(0 0% ${lmin+Math.floor(Math.random()*58)}%)`;
  }
  if(paletteMode==='image' && imagePalette && imagePalette.length){
    return imagePalette[Math.floor(Math.random()*imagePalette.length)];
  }
  if(palette && palette.length) return palette[Math.floor(Math.random()*palette.length)];
  return bg==='black'?'#ffffff':'#000000';
}
function morphStep(){
  if(!state || !state.patterns) return;
  const s=state, n=s.n;
  const fdMode = fdomainMode(s.mode);
  const cells  = fdomainCells(fdMode, n);
  const palette= getPalette(s.paletteMode, s.bg);

  for(const p of s.patterns){
    const flips = 1 + Math.floor(Math.random()*2); // 1 or 2
    const oldM    = p.m.map(r=>r.slice());
    const oldGrid = p.grid.map(r=>r.slice());
    for(let f=0; f<flips; f++){
      const [y,x] = cells[Math.floor(Math.random()*cells.length)];
      const nv = p.m[y][x] ? 0 : 1;
      for(const [oy,ox] of getOrbit(fdMode, n, y, x)) p.m[oy][ox] = nv;
    }
    const newGrid = Array.from({length:n},()=>Array(n).fill(null));
    for(let y=0;y<n;y++) for(let x=0;x<n;x++){
      if(!p.m[y][x]) continue;
      if(oldM[y][x] && oldGrid[y][x]){
        newGrid[y][x] = oldGrid[y][x]; // stays on — keep its colour
      } else {
        let nb = null;
        const cand=[[y-1,x],[y+1,x],[y,x-1],[y,x+1]];
        for(const [ny,nx] of cand){
          if(ny>=0&&ny<n&&nx>=0&&nx<n && oldGrid[ny] && oldGrid[ny][nx]){ nb = oldGrid[ny][nx]; break; }
        }
        newGrid[y][x] = morphPick(s.paletteMode, palette, s.bg, nb);
      }
    }
    p.grid = newGrid;
  }
  render();
}

// ========== autoplay ==========
let autoplayTimer=null;
function tickAutoplay(){
  // enum mode takes over — it advances the sweep each tick
  if(getVal('enum')==='1'){ setNum('seed', 0); generate(); return; }
  const src = getVal('autosrc');
  if(src==='morph'){ morphStep(); return; }
  if(src==='wild'){ setNum('seed', 0); generateWild(); return; }
  setNum('seed', 0); generate();
}
function updateEnumUI(){
  const on = getVal('enum')==='1';
  const gen = document.getElementById('gen');
  if(gen) gen.textContent = on ? 'next page ›' : 'regenerate';
}
function startAutoplay(){
  if(autoplayTimer) return;
  tickAutoplay();
  autoplayTimer=setInterval(tickAutoplay, +getVal('autospeed'));
  document.body.classList.add('autoplaying');
  updateAutoplayUI();
}
function stopAutoplay(){
  if(autoplayTimer){clearInterval(autoplayTimer);autoplayTimer=null}
  document.body.classList.remove('autoplaying');
  updateAutoplayUI();
}
function toggleAutoplay(){ autoplayTimer?stopAutoplay():startAutoplay() }
function updateAutoplayUI(){
  const on=!!autoplayTimer;
  const main=document.getElementById('autoplay');
  if(main) main.textContent=on?'■ stop':'▶ autoplay';
  const fs=document.getElementById('fsAutoplay');
  if(fs) fs.textContent=on?'■':'▶';
}

// ========== fullscreen ==========
function toggleFullscreen(){
  const d=document,el=d.documentElement;
  if(!d.fullscreenElement && !d.webkitFullscreenElement){
    const req=el.requestFullscreen||el.webkitRequestFullscreen;
    if(req){
      const p=req.call(el);
      if(p && p.catch) p.catch(()=>{document.body.classList.add('fs');onFullscreenChange()});
    } else {
      document.body.classList.add('fs');
      onFullscreenChange();
    }
  } else if(d.fullscreenElement||d.webkitFullscreenElement){
    (d.exitFullscreen||d.webkitExitFullscreen).call(d);
  } else {
    document.body.classList.remove('fs');
    onFullscreenChange();
  }
}
function onFullscreenChange(){
  const fs=!!(document.fullscreenElement||document.webkitFullscreenElement);
  if(fs!==document.body.classList.contains('fs')){
    document.body.classList.toggle('fs', fs);
  }
  // re-fit or regenerate after layout settles
  requestAnimationFrame(()=>{
    if(getVal('fit')==='1') generate();
    else fitCanvas();
  });
}
document.addEventListener('fullscreenchange', onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);

// ========== ui wiring ==========
document.querySelectorAll('.seg').forEach(seg=>{
  seg.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      seg.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      seg.dataset.val=btn.dataset.v;
      if(seg.id==='enum' || seg.id==='mode' || seg.id==='psize'){
        enumCursor=0; enumKey='';
        updateEnumUI();
      }
    });
  });
});
document.getElementById('fill').addEventListener('input',e=>{
  document.getElementById('fillv').textContent=e.target.value;
});
document.getElementById('gen').addEventListener('click',generate);
document.getElementById('genwild').addEventListener('click',generateWild);
document.getElementById('autoplay').addEventListener('click',toggleAutoplay);
document.getElementById('fullscreen').addEventListener('click',toggleFullscreen);
document.getElementById('fsAutoplay').addEventListener('click',toggleAutoplay);
document.getElementById('fsExit').addEventListener('click',toggleFullscreen);
document.getElementById('save').addEventListener('click',savePng);
document.getElementById('savejson').addEventListener('click',saveJson);
document.getElementById('download').addEventListener('click',downloadPng);
document.getElementById('enumrestart').addEventListener('click',()=>{
  enumCursor=0; enumKey='';
  if(getVal('enum')==='0') setSeg('enum','1');
  updateEnumUI();
  generate();
});

let slidePending=false;
document.getElementById('enumslider').addEventListener('input', ()=>{
  // enable enum implicitly if user drags while it's off
  if(getVal('enum')==='0'){ setSeg('enum','1'); updateEnumUI(); }
  if(slidePending) return;
  slidePending=true;
  requestAnimationFrame(()=>{
    slidePending=false;
    const frac = +document.getElementById('enumslider').value / 10000;
    const info = state && state.enumInfo;
    const total = (info && isFinite(info.fullTotal)) ? info.fullTotal : 1000000;
    enumCursor = Math.floor(frac * total);
    generate();
  });
});

// click on a pattern in the canvas → save that single symbol as PNG
document.getElementById('cv').addEventListener('click', e=>{
  if(!state) return;
  const cv = e.currentTarget;
  const rect = cv.getBoundingClientRect();
  // convert css coords to bitmap coords
  const bx = (e.clientX - rect.left) * (cv.width  / rect.width);
  const by = (e.clientY - rect.top)  * (cv.height / rect.height);
  const s = state;
  const relX = bx - s.offsetX;
  const relY = by - s.offsetY;
  if(relX < 0 || relY < 0) return;
  const stride = s.n * s.pscale + s.spacing;
  const blockSize = s.n * s.pscale;
  const col = Math.floor(relX / stride);
  const row = Math.floor(relY / stride);
  if(col < 0 || col >= s.cols || row < 0 || row >= s.rows) return;
  // ignore clicks that land in the spacing gap, not on the block itself
  const inX = relX - col * stride;
  const inY = relY - row * stride;
  if(inX > blockSize || inY > blockSize) return;
  const idx = row * s.cols + col;
  savePatternAt(idx);
});

// ========== image → palette ==========
function extractPaletteFromImage(file){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = () => {
      // downscale aggressively; 64×64 = 4K samples is enough for proportional reproduction
      const maxDim = 64;
      const scale = Math.min(1, maxDim/Math.max(img.width,img.height));
      const w = Math.max(1, Math.floor(img.width*scale));
      const h = Math.max(1, Math.floor(img.height*scale));
      const c = document.createElement('canvas');
      c.width=w; c.height=h;
      const cx = c.getContext('2d');
      cx.drawImage(img,0,0,w,h);
      let data;
      try { data = cx.getImageData(0,0,w,h).data; }
      catch(err){ reject(err); return; }
      const pool = [];
      for(let i=0;i<data.length;i+=4){
        if(data[i+3] < 80) continue; // skip near-transparent
        // light quantization to 8-unit buckets collapses near-duplicate samples
        const r = Math.round(data[i]/8)*8;
        const g = Math.round(data[i+1]/8)*8;
        const b = Math.round(data[i+2]/8)*8;
        pool.push(`rgb(${r},${g},${b})`);
      }
      resolve({pool, thumbUrl: URL.createObjectURL(file), w: img.width, h: img.height});
    };
    img.onerror = () => reject(new Error('image decode failed'));
    img.src = URL.createObjectURL(file);
  });
}
function showImagePrompt(){
  document.getElementById('imgdrop').innerHTML =
    `<span>drop image · or click to pick</span><input type="file" accept="image/*" hidden>`;
}
function showImagePreview(src, count, dims){
  document.getElementById('imgdrop').innerHTML =
    `<img class="drop-thumb" src="${src}"><span class="drop-info">${count.toLocaleString()} samples · ${dims}</span><button class="drop-clear" type="button">× clear</button><input type="file" accept="image/*" hidden>`;
}
async function loadImageFile(file){
  if(!file || !/^image\//.test(file.type||'')){ setStatus('not an image file','err'); return; }
  try {
    setStatus('extracting palette…');
    const {pool, thumbUrl, w, h} = await extractPaletteFromImage(file);
    if(!pool.length){ setStatus('no opaque pixels in image','err'); return; }
    imagePalette = pool;
    showImagePreview(thumbUrl, pool.length, `${w}×${h}`);
    setSeg('palette','image');
    generate();
    setStatus(`palette loaded · ${pool.length.toLocaleString()} samples from image`,'ok');
  } catch(e){ setStatus(`image load failed: ${e.message}`,'err'); }
}
function clearImagePalette(){
  imagePalette = null;
  showImagePrompt();
  if(getVal('palette')==='image'){ setSeg('palette','neon'); generate(); }
}
(function wireDrop(){
  const dz = document.getElementById('imgdrop');
  dz.addEventListener('click', e=>{
    if(e.target.classList && e.target.classList.contains('drop-clear')){
      e.stopPropagation();
      clearImagePalette();
      return;
    }
    const inp = dz.querySelector('input[type=file]');
    if(inp) inp.click();
  });
  dz.addEventListener('change', e=>{
    if(e.target.type==='file' && e.target.files && e.target.files[0]){
      loadImageFile(e.target.files[0]);
    }
  });
  ['dragenter','dragover'].forEach(ev=>{
    dz.addEventListener(ev, e=>{ e.preventDefault(); dz.classList.add('over'); });
  });
  ['dragleave','dragend'].forEach(ev=>{
    dz.addEventListener(ev, e=>{ e.preventDefault(); dz.classList.remove('over'); });
  });
  dz.addEventListener('drop', e=>{
    e.preventDefault(); dz.classList.remove('over');
    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if(f) loadImageFile(f);
  });
  // clicking the "image" palette button without a loaded image pops the file picker
  const imgBtn = document.querySelector('#palette button[data-v="image"]');
  if(imgBtn){
    imgBtn.addEventListener('click', ()=>{
      if(!imagePalette){
        const inp = dz.querySelector('input[type=file]');
        if(inp) inp.click();
      }
    });
  }
})();

updateEnumUI();
// restart autoplay interval when speed changes mid-playback
document.getElementById('autospeed').addEventListener('click', e=>{
  if(e.target.tagName==='BUTTON' && autoplayTimer){
    clearInterval(autoplayTimer);
    autoplayTimer=setInterval(tickAutoplay, +getVal('autospeed'));
  }
});
// re-generate when fit toggle changes
document.getElementById('fit').addEventListener('click', e=>{
  if(e.target.tagName==='BUTTON') requestAnimationFrame(generate);
});
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();generate()}
  else if(e.key==='r'||e.key==='R'){e.preventDefault();generateWild()}
  else if(e.key==='a'||e.key==='A'){e.preventDefault();toggleAutoplay()}
  else if(e.key==='f'||e.key==='F'){e.preventDefault();toggleFullscreen()}
  else if(e.key==='Escape' && document.body.classList.contains('fs') && !document.fullscreenElement){
    document.body.classList.remove('fs'); onFullscreenChange();
  }
  else if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();savePng()}
});
window.addEventListener('resize', fitCanvas);
window.addEventListener('load', fitCanvas);
window.addEventListener('orientationchange', fitCanvas);
if(window.ResizeObserver){
  new ResizeObserver(fitCanvas).observe(document.querySelector('.canvas-wrap'));
}

// go — defer first generate to the next frame so mobile webviews finish layout first
requestAnimationFrame(generate);
</script>
